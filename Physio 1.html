                                        <div className="flex items-center gap-1 text-[10px] text-slate-500 dark:text-slate-400">
                                            <Activity size={12}/> {p.adherence}%
                                        </div>
                                        <div className="text-[10px] text-slate-500 dark:text-slate-400">{p.nextAppt}</div>
                                    </div>
                                    <div className="mt-3 flex items-center gap-2">
                                        <button onClick={(e) => { e.stopPropagation(); setReferToTrainerModal({ patientId: p.id }); }} className="p-2 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Refer to Trainer"><Users size={14} /></button>
                                        <button onClick={(e) => { e.stopPropagation(); setAssignProtocolModal({ patientId: p.id }); }} className="p-2 hover:bg-white/30 dark:hover:bg-slate-700/50 rounded-full text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors" title="Assign Protocol"><FileText size={14} /></button>
                                        <button onClick={(e) => { e.stopPropagation(); openRosterPatientNote(p); }} className="p-2 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" title="Add clinical note"><FileTextMedical size={14} /></button>
                                        <button onClick={(e) => { e.stopPropagation(); openRosterPatientBooking(p); }} className="p-2 hover:bg-amber-50 dark:hover:bg-amber-900/30 rounded-full text-slate-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors" title="Book follow-up"><CalendarCheck size={14} /></button>
                                    </div>
                                </div>
                            )})}
                            {sortedRosterPatients.filter(p => (status === 'Restricted' ? ['Restricted', 'High Acuity'].includes(p.status) : p.status === status)).length === 0 && (
                                <div className="text-[11px] text-slate-400 italic border border-dashed border-slate-300/70 dark:border-slate-700 rounded-lg p-3">No matches</div>
                            )}
                        </div>
                    ))}
                </div>
            );

            // BUSINESS DASHBOARD
            const renderBusiness = () => {
                const validDates = appointments
                    .map((appt) => new Date(`${appt.date}T00:00:00`))
                    .filter((dt) => !Number.isNaN(dt.getTime()));
                const latestDate = validDates.sort((a, b) => b - a)[0] || new Date();
                const todayIso = toIsoDate(latestDate);
                const B_KIN_2026 = CNS_KEY_LETTER_2026;
                const focusPatientWorkspace = (patientId, view = 'roster') => {
                    const patient = patients.find((entry) => Number(entry.id) === Number(patientId));
                    if (patient) setSelectedPatient(patient);
                    openPatientWorkspace(view);
                };

                const pathwayMeta = {
                    common: {
                        title: 'Common pathology',
                        subtitle: 'Standard 8-session authorisation',
                        accentClass: 'bg-teal-100/80 text-teal-700 border-teal-200 dark:bg-teal-900/30 dark:text-teal-300 dark:border-teal-800',
                        coverageLabel: 'Usually 70% CNS coverage'
                    },
                    'post-surgical': {
                        title: 'Post-surgical',
                        subtitle: '32-session authorisation with 8-session checkpoints',
                        accentClass: 'bg-blue-100/80 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800',
                        coverageLabel: 'Often fully covered when the indication qualifies'
                    },
                    'serious-pathology': {
                        title: 'Serious pathology',
                        subtitle: 'Appendix G long-course pathway up to 64 sessions',
                        accentClass: 'bg-indigo-100/80 text-indigo-700 border-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-300 dark:border-indigo-800',
                        coverageLabel: 'Appendix G / long-course CNS pathway'
                    }
                };

                const getBlockProgress = (completedSessions, blockSize) => {
                    if (completedSessions <= 0) return 0;
                    return ((completedSessions - 1) % blockSize) + 1;
                };

                const luxBusinessCases = patients
                    .filter((patient) => patient.cnsEpisode)
                    .map((patient) => {
                        const episode = patient.cnsEpisode;
                        const { sessionLimit, completedSessions, blockSize, blockProgress, currentBlockRemaining, renewalDue, renewalTone, renewalLabel } = getEpisodeBlockMeta(episode);
                        const remainingSessions = Math.max(0, sessionLimit - completedSessions);
                        const closedBlocks = Math.floor(completedSessions / blockSize);
                        const billingReady = completedSessions > 0 && blockProgress === blockSize;
                        const currentBlockStatus = remainingSessions === 0
                            ? 'Authorisation fully used'
                            : completedSessions === 0
                                ? 'Block not started'
                                : billingReady
                                    ? `Closed block ${closedBlocks} ready for billing`
                                    : `Current block ${blockProgress}/${blockSize}`;
                        const invoiceMatch = invoices.find((inv) => Number(inv.patientId) === Number(patient.id) && !String(inv.serviceType || '').toLowerCase().includes('zcp1')) || null;
                        return {
                            patient,
                            ...episode,
                            meta: pathwayMeta[episode.pathway] || pathwayMeta.common,
                            remainingSessions,
                            closedBlocks,
                            blockSize,
                            blockProgress,
                            currentBlockRemaining,
                            renewalDue,
                            renewalTone,
                            renewalLabel,
                            billingReady,
                            currentBlockStatus,
                            invoiceMatch,
                            todayLoad: appointments.filter((appt) => Number(appt.patientId) === Number(patient.id) && appt.date === todayIso && appt.status === 'confirmed').length,
                            nextAppointmentLabel: patient.nextAppt || 'No follow-up booked'
                        };
                    })
                    .sort((a, b) => a.priority - b.priority || a.patient.name.localeCompare(b.patient.name));

                const zcp1Queue = appointments
                    .filter((appt) => appt.status === 'no-show' && appt.patientId)
                    .map((appt) => {
                        const patient = patients.find((entry) => Number(entry.id) === Number(appt.patientId));
                        const invoiceMatch = invoices.find((inv) => Number(inv.patientId) === Number(appt.patientId) && String(inv.serviceType || '').toLowerCase().includes('zcp1')) || null;
                        return {
                            ...appt,
                            patient,
                            invoiceMatch,
                            zcp1Status: appt.zcp1?.status || (invoiceMatch ? invoiceMatch.status : 'eligible'),
                            zcp1Note: appt.zcp1?.note || 'Uncovered admin fee should be handled outside the CNS episode.'
                        };
                    })
                    .sort((a, b) => new Date(`${b.date}T${b.time || '00:00'}:00`) - new Date(`${a.date}T${a.time || '00:00'}:00`));

                const pendingValidation = luxBusinessCases.filter((entry) => entry.validationStatus !== 'validated');
                    const pidToReconcile = luxBusinessCases.filter((entry) => ['submitted', 'acknowledged'].includes(getPidStatusMeta(entry).status));
                const complementaryReady = luxBusinessCases.filter((entry) => entry.complementaryStatus === 'ready');
                const seriousPathways = luxBusinessCases.filter((entry) => entry.pathway === 'serious-pathology');
                const renewalWatch = luxBusinessCases.filter((entry) => entry.currentBlockRemaining <= 2 || entry.renewalDue);
                const overdueInvoices = invoices.filter((inv) => inv.status === 'overdue' && !String(inv.serviceType || '').toLowerCase().includes('zcp1'));
                const settledPidTotal = luxBusinessCases
                        .filter((entry) => getPidStatusMeta(entry).status === 'paid')
                    .reduce((sum, entry) => sum + Number(entry.cnsAmount || 0), 0);
                const patientBalanceOpen = luxBusinessCases
                    .filter((entry) => ['ready', 'sent'].includes(entry.complementaryStatus))
                    .reduce((sum, entry) => sum + Number(entry.patientBalance || 0), 0);
                const appendixGOpen = seriousPathways.filter((entry) => entry.appendixCode === 'G').length;
                const confirmedToday = appointments.filter((appt) => appt.date === todayIso && appt.status === 'confirmed').length;
                const capacityPct = Math.min(100, Math.round((confirmedToday / 24) * 100));

                const openComplementaryInvoiceDraft = (entry) => {
                    const actCode = 'BKIN_1';
                    setInvoiceForm({
                        patientId: String(entry.patient.id),
                        serviceType: 'Complementary reimbursement packet',
                        actCode,
                        quantity: String(estimateInvoiceQuantity({ balance: entry.patientBalance, actCode, coveragePct: entry.coveragePct })),
                        dueDate: toIsoDate(withDays(new Date(), 14)),
                        notes: `${entry.meta.title} block closed. Patient portion ${entry.coveragePct === 100 ? 'fully covered by CNS' : `after ${entry.coveragePct}% CNS coverage`} and invoice prepared for complementary insurer.`
                    });
                    setShowInvoiceModal(true);
                };

                const openZcp1InvoiceDraft = (entry) => {
                    setInvoiceForm({
                        patientId: String(entry.patient?.id || ''),
                        serviceType: 'ZCP1 missed appointment fee',
                        actCode: 'ZCP1',
                        quantity: '1',
                        dueDate: toIsoDate(withDays(new Date(), 14)),
                        notes: `ZCP1 no-show on ${entry.date} at ${entry.time}. ${entry.zcp1Note}`
                    });
                    setShowInvoiceModal(true);
                };

                const pathwayCards = Object.entries(pathwayMeta).map(([key, meta]) => {
                    const entries = luxBusinessCases.filter((entry) => entry.pathway === key);
                    return {
                        key,
                        ...meta,
                        count: entries.length,
                        usedSessions: entries.reduce((sum, entry) => sum + Number(entry.completedSessions || 0), 0),
                        totalSessions: entries.reduce((sum, entry) => sum + Number(entry.sessionLimit || 0), 0),
                        appendixSummary: key === 'serious-pathology' ? `${entries.filter((entry) => entry.appendixCode === 'G').length} Appendix G case${entries.filter((entry) => entry.appendixCode === 'G').length === 1 ? '' : 's'}` : null
                    };
                });

                const businessActions = [
                    pendingValidation[0] ? {
                        title: `Titre de prise en charge needed · ${pendingValidation[0].patient.name}`,
                        desc: `${pendingValidation[0].diagnosisCode} · Prescription must be validated before new care can be booked or billed.`,
                        icon: ShieldAlert,
                        color: 'red',
                        actions: [
                            { label: 'Open patient', primary: true, onClick: () => focusPatientWorkspace(pendingValidation[0].patient.id, 'roster') },
                            { label: 'Queue filing', primary: false, onClick: () => triggerToast('CNS validation request queued for filing.') }

                    seriousPathways[0] ? {
                        title: `Appendix G review · ${seriousPathways[0].patient.name}`,

                            { label: 'Open patient', primary: true, onClick: () => focusPatientWorkspace(seriousPathways[0].patient.id, 'roster') },

                    pidToReconcile[0] ? {

                        color: 'amber',
                        actions: [
                            { label: 'Draft ZCP1', primary: true, onClick: () => openZcp1InvoiceDraft(zcp1Queue[0]) },
                            { label: 'Open patient', primary: false, onClick: () => focusPatientWorkspace(zcp1Queue[0].patient?.id, 'roster') }

                    overdueInvoices[0] ? {
                        title: `Overdue patient balance · ${patients.find((p) => p.id === overdueInvoices[0].patientId)?.name || 'Patient'}`,

                        icon: AlertCircle,
                        color: 'red',
                        actions: [
                            { label: 'Resend invoice', primary: true, onClick: () => resendInvoice(overdueInvoices[0].id) },
                            { label: 'Mark paid', primary: false, onClick: () => markInvoicePaid(overdueInvoices[0].id) }

                return (

                                <h1 className="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">CNS-first billing, PID, and complementary follow-through</h1>
                                <div className="flex flex-wrap gap-3 mt-3 text-sm text-slate-500 dark:text-slate-400">
                                    <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-teal-500"></span> <b>{`Bkin ${B_KIN_2026.toFixed(4)}`}</b> key letter</span>
                                    <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-blue-500"></span> <b>24 sessions/day</b> CNS quality cap</span>
                                    <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-amber-500"></span> <b>2 sessions/hour</b> CNS hourly cap</span>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <button onClick={() => window.print()} className="px-4 py-2 glass-panel rounded-lg text-xs font-bold hover:bg-white/40 dark:hover:bg-slate-700/40 shadow-sm flex items-center gap-2 text-slate-700 dark:text-slate-200">
                                    <Printer size={16}/> Export CNS desk
                                </button>
                                <button onClick={() => triggerToast('Nomenclature lookup connected to CNS tariff codes.')} className="px-4 py-2 glass-panel rounded-lg text-xs font-bold hover:bg-white/40 dark:hover:bg-slate-700/40 shadow-sm flex items-center gap-2 text-slate-700 dark:text-slate-200">
                                    <FileText size={16}/> Nomenclature
                                </button>
                                <button onClick={() => {
                                    setInvoiceForm((prev) => ({
                                        ...prev,
                                        serviceType: 'Patient balance statement',
                                        actCode: prev.actCode || 'BKIN_1',
                                        quantity: prev.quantity || '1',
                                        dueDate: prev.dueDate || toIsoDate(withDays(new Date(), 14))
                                    }));
                                    setShowInvoiceModal(true);
                                }} className="px-4 py-2 bg-teal-600 text-white rounded-lg text-xs font-bold shadow-md hover:bg-teal-700 flex items-center gap-2">
                                    <Plus size={16}/> Issue patient invoice
                                </button>
                            </div>
                        </header>

                        <section className="grid grid-cols-1 xl:grid-cols-[minmax(0,2.1fr)_320px] gap-6">
                            <div className="glass-panel rounded-2xl p-5 border border-white/20 dark:border-slate-700/40">
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <div className="text-[10px] uppercase font-bold tracking-[0.2em] text-teal-600 dark:text-teal-400">Luxembourg workflow baseline</div>
                                        <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100 mt-1">What this hub is enforcing</h3>
                                    </div>
                                    <span className="text-[10px] px-2 py-0.5 rounded-full bg-teal-100/80 dark:bg-teal-900/30 text-teal-700 dark:text-teal-300 border border-teal-200/60 dark:border-teal-800/60">2026 CNS model</span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 text-xs">
                                    <div className="p-3 rounded-xl bg-white/40 dark:bg-slate-800/40 border border-slate-200/50 dark:border-slate-700/50">
                                        <div className="text-[10px] uppercase font-bold tracking-[0.18em] text-slate-400 mb-1">Prescription</div>
                                        <div className="text-slate-700 dark:text-slate-200 leading-5">Medical prescription is mandatory before CNS coverage applies.</div>
                                    </div>
                                    <div className="p-3 rounded-xl bg-white/40 dark:bg-slate-800/40 border border-slate-200/50 dark:border-slate-700/50">
                                        <div className="text-[10px] uppercase font-bold tracking-[0.18em] text-slate-400 mb-1">Coverage blocks</div>
                                        <div className="text-slate-700 dark:text-slate-200 leading-5">8 sessions common, 32 post-surgical, 64 serious pathology.</div>
                                    </div>
                                    <div className="p-3 rounded-xl bg-white/40 dark:bg-slate-800/40 border border-slate-200/50 dark:border-slate-700/50">
                                        <div className="text-[10px] uppercase font-bold tracking-[0.18em] text-slate-400 mb-1">PID standard</div>
                                        <div className="text-slate-700 dark:text-slate-200 leading-5">Patient pays only the uncovered share; CNS settles the covered part digitally.</div>
                                    </div>
                                    <div className="p-3 rounded-xl bg-white/40 dark:bg-slate-800/40 border border-slate-200/50 dark:border-slate-700/50">
                                        <div className="text-[10px] uppercase font-bold tracking-[0.18em] text-slate-400 mb-1">Complementary</div>
                                        <div className="text-slate-700 dark:text-slate-200 leading-5">Issue QR invoice after block closure so the patient can claim top-up reimbursement.</div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel rounded-2xl p-5 border border-white/20 dark:border-slate-700/40">
                                <div className="text-[10px] uppercase font-bold tracking-[0.2em] text-slate-400 mb-2">Daily load</div>
                                <div className="text-3xl font-bold text-slate-900 dark:text-white">{confirmedToday}/24</div>
                                <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">Confirmed sessions on {todayIso}</div>
                                <div className="mt-3 w-full h-2 rounded-full bg-slate-200/60 dark:bg-slate-700/60 overflow-hidden">
                                    <div className={`h-full rounded-full ${capacityPct >= 90 ? 'bg-red-500' : capacityPct >= 70 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${capacityPct}%` }}></div>
                                </div>
                                <div className="mt-3 text-[11px] text-slate-500 dark:text-slate-400">CNS quality rule still applies: no more than 2 sessions per hour and 24 per day.</div>
                            </div>
                        </section>

                        <section>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                    <Briefcase size={18} className="text-teal-600"/> Automated admin queue
                                </h3>
                                <span className="text-xs text-slate-400">Surface only the blockers that still need human review</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
                                {businessActions.map((item, index) => (
                                    <ActionCard key={item.title} title={item.title} desc={item.desc} icon={item.icon} color={item.color} delay={`${index * 0.08}s`} actions={item.actions} />
                                ))}
                            </div>
                        </section>

                        <section>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                    <Activity size={18} className="text-indigo-600"/> Coverage pathways

                                <span className="text-xs text-slate-400">Make the 8, 32, and Appendix G 64-session routes visible at a glance</span>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                {pathwayCards.map((pathway) => (
                                    <div key={pathway.key} className="glass-panel rounded-2xl p-5 border border-white/10">
                                        <div className="flex items-start justify-between gap-3 mb-3">
                                            <div>
                                                <div className="text-sm font-bold text-slate-900 dark:text-slate-100">{pathway.title}</div>
                                                <div className="text-[11px] text-slate-500 dark:text-slate-400 mt-1">{pathway.subtitle}</div>
                                            </div>
                                            <span className={`text-[10px] px-2 py-1 rounded-full border ${pathway.accentClass}`}>{pathway.count} case{pathway.count === 1 ? '' : 's'}</span>
                                        </div>

                                        <div className="flex items-end justify-between">

                                            {pathway.appendixSummary && <div className="text-[11px] text-slate-500 dark:text-slate-400 text-right">{pathway.appendixSummary}</div>}

                                ))}

                        <section>

                                    <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">Prescription blocks not yet ready for CNS validation.</div>

                                <div className="glass-panel rounded-xl p-4 border border-white/10">

                                    <div className="text-2xl font-bold text-slate-900 dark:text-white mt-1">{formatEuro(settledPidTotal)}</div>

                                </div>
                                <div className="glass-panel rounded-xl p-4 border border-white/10">
                                    <div className="text-[10px] uppercase text-slate-400 font-bold">Appendix G active</div>
                                    <div className="text-2xl font-bold text-slate-900 dark:text-white mt-1">{appendixGOpen}</div>
                                    <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">Serious pathology pathways currently using the long-course authorisation.</div>

                        <section>

                                <h3 className="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                    <ShieldAlert size={18} className="text-indigo-600"/> CNS episode tracker
                                </h3>
                                <span className="text-xs text-slate-400">Track prescription, title de prise en charge, coverage class, and billing readiness together</span>
                            </div>
                            <div className="glass-panel rounded-2xl overflow-hidden border border-white/30 dark:border-slate-700/40">
                                <div className="grid grid-cols-12 text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 bg-white/20 dark:bg-slate-800/30 px-4 py-3">

                                    {luxBusinessCases.map((entry) => (

                                                <div className="text-slate-800 dark:text-slate-200 font-semibold">{entry.meta.title}</div>
                                                <div className="text-[11px] text-slate-500 dark:text-slate-400 mt-1">CNS covers {entry.coveragePct}%</div>
                                                <div className="text-[11px] text-slate-400 mt-1">Prescriber: {entry.prescriber}{entry.appendixCode ? ` · Appendix ${entry.appendixCode}` : ''}</div>

                )}

                </div>
            );
        }

        class ClinicalErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError() {
                return { hasError: true };
            }

            componentDidCatch(error) {
                console.error('Clinical dashboard render error', error);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', fontFamily: 'Inter, sans-serif', color: '#ef4444', padding: '24px', textAlign: 'center' }}>
                            <div>
                                <div style={{ fontSize: '1.25rem', fontWeight: 700, marginBottom: '6px' }}>Clinical dashboard failed to load.</div>
                                <div style={{ color: '#64748b', fontSize: '0.92rem' }}>Refresh the page. If this persists, contact platform support with the timestamp.</div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const role = localStorage.getItem('verve_session_role');
        if (role && role !== 'physio') {
            console.warn('[Verve] Overriding session role for physio console view:', role);
            try {
                localStorage.setItem('verve_session_role', 'physio');
            } catch (e) {
                // ignore
            }
        }

        {
            const container = document.getElementById('root');
            const root = (typeof ReactDOM !== 'undefined' && typeof ReactDOM.createRoot === 'function')
                ? ReactDOM.createRoot(container)
                : (typeof ReactDOMClient !== 'undefined' && typeof ReactDOMClient.createRoot === 'function')
                    ? ReactDOMClient.createRoot(container)
                    : null;

            const App = (
                <ClinicalErrorBoundary>
                    <ClinicalDashboard />
                </ClinicalErrorBoundary>
            );

            if (root) {
                root.render(App);
            } else if (typeof ReactDOM !== 'undefined' && typeof ReactDOM.render === 'function') {
                ReactDOM.render(App, container);
            } else {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#ef4444;font-size:1.1rem;padding:24px;text-align:center;">Clinical dashboard dependencies failed to load. Check your internet connection / CDN access (React, ReactDOM, Babel).</div>';
            }
        }
    </script>
</body>
</html>
