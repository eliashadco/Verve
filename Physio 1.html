        tailwind.config = {
            darkMode: 'class',

                extend: {

                        slate: {
                            850: '#1e293b', 
                            900: '#0f172a', 
                            950: '#020617', 
                        },
                        teal: {
                            400: '#2dd4bf',
                            500: '#14b8a6',

    <style>
        body {

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }

        .animate-in { animation: fadeIn 0.3s ease-out; }

        .verve-prop-flash { animation: verveStepFlash 1.2s ease-out; }
        @keyframes verveStepFlash {
            0% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.7); transform: scale(1); }

            100% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); transform: scale(1); }
        }
        
        /* Glass Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body.dark-lift:not(.high-contrast) {
            background: #0b1728;
        }

        body.dark-lift:not(.high-contrast) .glass-panel {
            background: rgba(36, 50, 71, 0.52);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-lift:not(.high-contrast) aside,
        body.dark-lift:not(.high-contrast) main {
            filter: brightness(1.28) contrast(1.04);
        }

        /* High Contrast "Clinical Mode" Overrides */
        body.high-contrast {
            background: #f1f5f9 !important; /* Slate-100 flat */
        }
        body.high-contrast.dark {
            background: #020617 !important; /* Slate-950 flat */
        }
        body.high-contrast .glass-panel {
            background: #ffffff !important;
            backdrop-filter: none !important;
            border: 2px solid #cbd5e1 !important; /* Slate-300 */
            box-shadow: none !important;
        }
        body.high-contrast.dark .glass-panel {
            background: #0f172a !important; /* Slate-900 */
            border: 2px solid #334155 !important; /* Slate-700 */
        }
        /* Make text sharper in HC mode */
        body.high-contrast * {
            text-rendering: optimizeLegibility;
        }

        @media print {
            body {
                background: #ffffff !important;
                color: #0f172a !important;
            }

            .no-print {
                display: none !important;
            }

            main {
                margin-left: 0 !important;
                padding: 0.4in !important;
                height: auto !important;
                overflow: visible !important;
            }

            .glass-panel {
                background: #ffffff !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            button,
            input,
            textarea,
            select {
                border-color: #cbd5e1 !important;
                box-shadow: none !important;
            }

            [class*="dark:"],
            .dark {
                color: #0f172a !important;
                background: #ffffff !important;
            }
        }

        .skip-link {
            position: absolute;
            left: 10px;
            top: -44px;
            z-index: 120;
            padding: 8px 12px;
            border-radius: 8px;
            background: #0f172a;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            transition: top 0.2s ease;
        }

        .skip-link:focus {
            top: 10px;
            outline: 2px solid #14b8a6;
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

                            </div>
                        </div>

                        <div className="p-6 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50 flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 text-sm text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">Close</button>
                            <button onClick={() => { onAssign(protocol); onClose(); }} className="px-6 py-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-lg text-sm font-bold shadow-lg hover:scale-105 transition-transform flex items-center gap-2">
                                Assign Protocol
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProtocolBuilder = ({ onClose, onSaveTemplate, onAssignPlan, initialProtocol, patientName }) => {
            const [step, setStep] = useState(initialProtocol ? 2 : 1);
            const [inputs, setInputs] = useState({ diagnosis: '', irritability: 'Moderate', acuity: 'Acute', goals: 'Return to Walking' });
            const [generatedPlan, setGeneratedPlan] = useState(
                initialProtocol
                    ? {
                        title: initialProtocol.name || 'Custom Protocol',
                        focus: initialProtocol.phase || initialProtocol.category || 'Custom',
                        exercises: initialProtocol.exercises ? [...initialProtocol.exercises] : []
                    }
                    : null
            );
            const [swapTarget, setSwapTarget] = useState(null);
            const [deliveryMethod, setDeliveryMethod] = useState('app');
            const [saveAsTemplate, setSaveAsTemplate] = useState(false);

            const handleGenerate = () => {
                let plan = { title: "Custom Plan", focus: "", exercises: [] };
                if (inputs.irritability === 'High') {
                    plan.focus = "Symptom Modulation & Isometric Loading";
                    plan.exercises = [
                        { name: `Iso Hold for ${inputs.diagnosis || 'Target Tissue'}`, sets: '5', reps: '45s', notes: 'Push 50%' },
                        { name: "Pain-free ROM", sets: '1', reps: '20', notes: 'Hourly' }
                    ];
                } else {
                    plan.focus = "Controlled Loading";
                    plan.exercises = [
                        { name: `Eccentric ${inputs.diagnosis || 'Target Tissue'}`, sets: '3', reps: '15', notes: '3s down' },
                        { name: "Proprioception", sets: '3', reps: '1min', notes: 'Eyes closed' }
                    ];
                }
                setGeneratedPlan(plan);
                setStep(2);
            };

            const handleDelete = (idx) => {
                const updated = [...generatedPlan.exercises];
                updated.splice(idx, 1);
                setGeneratedPlan({ ...generatedPlan, exercises: updated });
            };

            const handleSwap = (idx, newName) => {
                const updated = [...generatedPlan.exercises];
                updated[idx].name = newName;
                setGeneratedPlan({ ...generatedPlan, exercises: updated });
                setSwapTarget(null);
            };

            const handleUpdate = (idx, field, val) => {
                const updated = [...generatedPlan.exercises];
                updated[idx][field] = val;
                setGeneratedPlan({ ...generatedPlan, exercises: updated });
            };

            const handleAddExercise = () => {
                if (!generatedPlan) return;
                const updated = [...generatedPlan.exercises, { name: 'Custom Exercise', sets: '3', reps: '10', notes: '' }];
                setGeneratedPlan({ ...generatedPlan, exercises: updated });
            };

            const handleFinalSave = () => {
                let message = '';
                if (deliveryMethod === 'app') message = `Protocol pushed to ${patientName || 'patient'} app!`;
                else if (deliveryMethod === 'email') message = `Protocol PDF emailed to ${patientName || 'patient'}!`;
                else message = `Protocol sent to printer for ${patientName || 'patient'}!`;
                if (saveAsTemplate && onSaveTemplate) onSaveTemplate(generatedPlan);
                if (generatedPlan && onAssignPlan) onAssignPlan(generatedPlan, deliveryMethod);
                if (!onAssignPlan) alert(message);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={onClose}></div>
                    <div className="relative bg-white dark:bg-slate-900 w-full max-w-3xl rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-in zoom-in-95 flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2"><Wand2 className="text-teal-500" size={20}/> {initialProtocol ? 'Review & Assign' : 'Protocol Designer'}</h3>
                                <p className="text-xs text-slate-500">{initialProtocol ? `Adjusting for ${patientName || 'Patient'}` : 'AI-Assisted Clinical Reasoning Engine'}</p>
                            </div>
                            <div className="flex gap-2">
                                {!initialProtocol && <div className={`h-2 w-2 rounded-full ${step === 1 ? 'bg-teal-500' : 'bg-slate-300'}`}></div>}
                                <div className={`h-2 w-2 rounded-full ${step === 2 ? 'bg-teal-500' : 'bg-slate-300'}`}></div>
                            </div>
                        </div>

                        <div className="p-8 overflow-y-auto flex-1 relative">
                            {step === 1 ? (
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Diagnosis</label>
                                        <input value={inputs.diagnosis} onChange={e => setInputs({...inputs, diagnosis: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-teal-500/20 outline-none dark:text-white" placeholder="e.g. Patellar Tendinopathy" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Irritability</label>
                                            <div className="space-y-2">
                                                {['Low', 'Moderate', 'High'].map(opt => (
                                                    <div key={opt} onClick={() => setInputs({...inputs, irritability: opt})} className={`p-3 rounded-lg border text-sm cursor-pointer ${inputs.irritability === opt ? 'border-teal-500 bg-teal-50 dark:bg-teal-900/20 text-teal-700 dark:text-teal-300' : 'border-slate-200 dark:border-slate-700'}`}>
                                                        <div className="font-bold">{opt}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Healing Phase</label>
                                                <select className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-sm dark:text-white"><option>Acute</option><option>Sub-acute</option><option>Chronic</option></select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Pain Scale</label>
                                                <input type="range" min="0" max="10" className="w-full accent-teal-500" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="relative space-y-6 animate-in slide-in-from-right-4">
                                    <div className="bg-teal-50 dark:bg-teal-900/20 p-4 rounded-xl border border-teal-100 dark:border-teal-800">
                                        <h4 className="text-teal-800 dark:text-teal-200 font-bold mb-1">Clinical Logic Applied</h4>
                                        <p className="text-xs text-teal-600 dark:text-teal-400">
                                            {initialProtocol
                                                ? `Based on Protocol: ${initialProtocol.name || 'Standard'}`
                                                : <>Diagnosis: <b>{inputs.diagnosis || 'Not specified'}</b> • Irritability: <b>{inputs.irritability}</b></>
                                            }
                                        </p>
                                    </div>
                                    <h4 className="text-sm font-bold text-slate-500 uppercase mb-3">Prescribed Exercises (Editable)</h4>
                                    <div className="space-y-3">
                                        {generatedPlan.exercises.map((ex, i) => (
                                            <div
                                                key={i}
                                                className="flex flex-col gap-2 p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm group cursor-pointer"
                                                onClick={() => setSwapTarget(i)}
                                            >
                                                <div className="flex justify-between items-center">
                                                    <div className="font-bold text-slate-800 dark:text-slate-200 hover:text-teal-500 flex items-center gap-1">
                                                        {ex.name} <ChevronRight size={12} className="text-slate-400"/>
                                                    </div>
                                                    <div className="flex gap-2 items-center">
                                                        <input className="w-12 p-1 text-xs text-center border rounded bg-transparent" value={ex.sets} onClick={(e) => e.stopPropagation()} onChange={(e) => handleUpdate(i, 'sets', e.target.value)} placeholder="Sets"/>
                                                        <span className="text-slate-400">x</span>
                                                        <input className="w-12 p-1 text-xs text-center border rounded bg-transparent" value={ex.reps} onClick={(e) => e.stopPropagation()} onChange={(e) => handleUpdate(i, 'reps', e.target.value)} placeholder="Reps"/>
                                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(i); }} className="text-slate-400 hover:text-red-500"><Trash size={14}/></button>
                                                    </div>
                                                </div>
                                                <input className="w-full text-xs text-slate-500 bg-transparent border-none outline-none placeholder-slate-300 italic" placeholder="Add cues (e.g. 'Keep core tight')..." value={ex.notes} onClick={(e) => e.stopPropagation()} onChange={(e) => handleUpdate(i, 'notes', e.target.value)}/>

                                        ))}

                                    </div>

                                    {swapTarget !== null && (
                                        <div className="absolute inset-0 bg-white/95 dark:bg-slate-900/95 z-10 p-6 flex flex-col animate-in fade-in">
                                            <div className="flex justify-between mb-4"><h4 className="font-bold">Swap Exercise</h4><button onClick={() => setSwapTarget(null)}><X size={18}/></button></div>
                                            <div className="flex-1 overflow-y-auto space-y-2">
                                                {EXERCISE_DB.map(exName => (
                                                    <button key={exName} onClick={() => handleSwap(swapTarget, exName)} className="w-full text-left p-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-sm">{exName}</button>

                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                        <div className="p-6 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">

                                    <div className="flex items-center justify-between">
                                        <label className="flex items-center gap-2 text-xs text-slate-600 dark:text-slate-300 cursor-pointer">

                                        </label>
                                        <div className="flex bg-slate-200 dark:bg-slate-700 rounded-lg p-1">
                                            <button onClick={() => setDeliveryMethod('app')} className={`px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-2 ${deliveryMethod === 'app' ? 'bg-white dark:bg-slate-900 shadow-sm text-teal-600' : 'text-slate-500'}`}><Smartphone size={14}/> App</button>
                                            <button onClick={() => setDeliveryMethod('email')} className={`px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-2 ${deliveryMethod === 'email' ? 'bg-white dark:bg-slate-900 shadow-sm text-blue-500' : 'text-slate-500'}`}><Mail size={14}/> Email</button>
                                            <button onClick={() => setDeliveryMethod('print')} className={`px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-2 ${deliveryMethod === 'print' ? 'bg-white dark:bg-slate-900 shadow-sm text-slate-800 dark:text-slate-200' : 'text-slate-500'}`}><Printer size={14}/> Print</button>
                                        </div>
                                    </div>
                                    <button onClick={handleFinalSave} className={`w-full py-3 rounded-xl text-white font-bold shadow-lg flex items-center justify-center gap-2 ${deliveryMethod === 'app' ? 'bg-teal-600 hover:bg-teal-700' : deliveryMethod === 'email' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-slate-700 hover:bg-slate-800'}`}>
                                        {deliveryMethod === 'app' ? 'Assign & Push to App' : deliveryMethod === 'email' ? 'Generate & Email PDF' : 'Generate & Print PDF'}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Body Map
        const BodyMap = ({ hotspots, onToggle, view }) => {
            const zonesAnterior = [
                { id: 'deltoid_l', x: 36, y: 24, label: 'L. Deltoid' },
                { id: 'deltoid_r', x: 64, y: 24, label: 'R. Deltoid' },
                { id: 'pecs', x: 50, y: 30, label: 'Pectorals' },
                { id: 'biceps_l', x: 32, y: 36, label: 'L. Biceps' },
                { id: 'biceps_r', x: 68, y: 36, label: 'R. Biceps' },
                { id: 'forearm_l', x: 30, y: 48, label: 'L. Forearm' },
                { id: 'forearm_r', x: 70, y: 48, label: 'R. Forearm' },
                { id: 'abs', x: 50, y: 46, label: 'Abdominals' },
                { id: 'quad_l', x: 42, y: 66, label: 'L. Quadriceps' },
                { id: 'quad_r', x: 58, y: 66, label: 'R. Quadriceps' },
                { id: 'shin_l', x: 42, y: 84, label: 'L. Tibialis' },
                { id: 'shin_r', x: 58, y: 84, label: 'R. Tibialis' }
            ];

            const zonesPosterior = [
                { id: 'trap_l', x: 38, y: 24, label: 'L. Trapezius' },
                { id: 'trap_r', x: 62, y: 24, label: 'R. Trapezius' },
                { id: 'upper_back', x: 50, y: 34, label: 'Upper Back' },
                { id: 'erector', x: 50, y: 44, label: 'Spine Erectors' },
                { id: 'glute_l', x: 44, y: 60, label: 'L. Glute' },
                { id: 'glute_r', x: 56, y: 60, label: 'R. Glute' },
                { id: 'hamstring_l', x: 44, y: 72, label: 'L. Hamstring' },
                { id: 'hamstring_r', x: 56, y: 72, label: 'R. Hamstring' },
                { id: 'calf_l', x: 44, y: 86, label: 'L. Calf' },
                { id: 'calf_r', x: 56, y: 86, label: 'R. Calf' }
            ];

            const zones = view === 'posterior' ? zonesPosterior : zonesAnterior;

            return (
                <div className="relative w-full h-[360px] bg-slate-100/30 dark:bg-slate-800/30 rounded-xl border border-white/30 dark:border-white/10 flex items-center justify-center overflow-hidden backdrop-blur-sm">
                <img
                    src="assets/img/anatomy-model.jpeg"
                    alt="Anatomy model"
                    className="absolute inset-0 w-full h-full object-contain opacity-95"
                    style={{ transform: view === 'posterior' ? 'scaleX(-1)' : 'none' }}
                    draggable="false"
                />
                <div className="absolute inset-0 pointer-events-none bg-gradient-to-b from-white/10 via-transparent to-slate-900/10"></div>
                <div className="absolute bottom-2 left-2 text-[10px] text-slate-400 font-mono">
                    Tap a muscle group to add notes & AI suggestions
                </div>
                
                {zones.map(z => {
                    const status = hotspots[z.id] || 'clear';
                    let bgClass = "bg-white/80 border-slate-300 text-slate-400 dark:bg-slate-700/80 dark:border-slate-600 dark:text-slate-400";
                    if (status === 'sore') bgClass = "bg-blue-100/80 border-blue-400 text-blue-600 dark:bg-blue-900/60 dark:border-blue-700 dark:text-blue-400";
                    if (status === 'acute') bgClass = "bg-red-100/80 border-red-400 text-red-600 animate-pulse dark:bg-red-900/60 dark:border-red-700 dark:text-red-400";

                    return (
                    <button
                        key={z.id}
                        onClick={() => onToggle(z.id, z.label)}
                        className={`absolute w-7 h-7 rounded-full border-2 flex items-center justify-center shadow-sm transition-all hover:scale-110 backdrop-blur-sm ${bgClass}`}
                        style={{ left: `${z.x}%`, top: `${z.y}%`, transform: 'translate(-50%, -50%)' }}
                        title={`${z.label}: ${status.toUpperCase()}`}
                    >
                        {status === 'acute' ? <AlertCircle size={12} /> : status === 'sore' ? <Activity size={12} /> : <div className="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-500" />}
                    </button>
                    );
                })}
                </div>
            );
        };

        // Graph Modal Component
        const GraphModal = ({ data, onClose }) => {
            // Mock data for graph if not provided
            const graphData = data || [
                { week: 1, pain: 7, load: 30 },
                { week: 2, pain: 6, load: 45 },
                { week: 3, pain: 4, load: 60 },
                { week: 4, pain: 3, load: 75 },
                { week: 5, pain: 2, load: 85 },
            ];
            const chartWidth = 760;
            const chartHeight = 256;
            const pointCount = Math.max(1, graphData.length - 1);

            const toX = (index) => (index / pointCount) * chartWidth;
            const toLoadY = (load) => chartHeight - (Math.max(0, Math.min(100, Number(load) || 0)) / 100) * chartHeight;
            const toPainY = (pain) => chartHeight - (Math.max(0, Math.min(10, Number(pain) || 0)) / 10) * chartHeight;

            const loadLinePoints = graphData.map((d, i) => `${toX(i)},${toLoadY(d.load)}`);
            const painLinePoints = graphData.map((d, i) => `${toX(i)},${toPainY(d.pain)}`);
            const loadAreaPath = [
                `M0,${toLoadY(graphData[0]?.load)}`,
                ...loadLinePoints.slice(1).map((pt) => `L${pt}`),
                `L${chartWidth},${chartHeight}`,
                `L0,${chartHeight}`,
                'Z'
            ].join(' ');

            return (
                <div className="fixed inset-0 z-[90] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-white dark:bg-slate-900 w-full max-w-2xl rounded-2xl shadow-2xl p-6 border border-slate-200 dark:border-slate-800 animate-in zoom-in-95">

                                <h3 className="text-xl font-bold text-slate-900 dark:text-white">Rehab Progression Analysis</h3>
                                <p className="text-sm text-slate-500">Pain vs. Load Volume (Last 5 Weeks)</p>
                            </div>
                            <button onClick={onClose}><X size={24} className="text-slate-400 hover:text-slate-600"/></button>
                        </div>
                        
                        <div className="h-64 w-full relative border-l border-b border-slate-300 dark:border-slate-700">

                            <div className="absolute -left-8 top-0 text-xs text-red-500 font-bold">10</div>
                            <div className="absolute -left-8 bottom-0 text-xs text-red-500 font-bold">0</div>
                            <div className="absolute -right-8 top-0 text-xs text-blue-500 font-bold">100%</div>
                            
                            <svg className="w-full h-full overflow-visible" viewBox={`0 0 ${chartWidth} ${chartHeight}`} preserveAspectRatio="none">
                                {/* Load Area */}
                                <path 
                                    d={loadAreaPath}
                                    className="fill-blue-100/50 dark:fill-blue-900/20" 
                                />
                                <path 
                                    d={`M${loadLinePoints.join(' L')}`}
                                    fill="none" 
                                    stroke="#3b82f6" 
                                    strokeWidth="2" 
                                />
                                
                                {/* Pain Line */}
                                <path 
                                    d={`M${painLinePoints.join(' L')}`}
                                    fill="none" 
                                    stroke="#ef4444" 
                                    strokeWidth="3" 
                                    strokeLinecap="round"
                                />
                                {/* Points */}
                                {graphData.map((d, i) => (
                                    <circle key={i} cx={toX(i)} cy={toPainY(d.pain)} r="4" fill="#ef4444" className="hover:r-6 transition-all cursor-pointer">
                                        <title>Pain: {d.pain}/10</title>
                                    </circle>
                                ))}
                            </svg>

                                <span className="w-3 h-3 bg-blue-500 rounded-full"></span> Load Capacity
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Video Modal Component
        const VideoModal = ({ title, detail, onClose }) => (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={onClose}></div>
                <div className="relative bg-white dark:bg-slate-900 w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 border border-slate-200 dark:border-slate-700">
                   <div className="p-6 border-b border-slate-200/70 dark:border-slate-700/70 bg-gradient-to-r from-teal-50 to-cyan-50 dark:from-teal-900/30 dark:to-cyan-900/30">
                       <div className="flex items-center justify-between gap-4">
                           <div>
                               <h4 className="text-xl font-bold text-slate-900 dark:text-slate-100">{title}</h4>

                       <div className="md:col-span-2">

                               <div className="relative w-full rounded-xl overflow-hidden bg-black" style={{ paddingBottom: '56.25%' }}>
                                   <iframe
                                       className="absolute inset-0 w-full h-full"

                               <div className="w-full rounded-xl bg-slate-800/60 border border-slate-700/50 flex flex-col items-center justify-center gap-2 py-10">

                                   <p className="text-sm text-slate-400">Exercise demo video coming soon</p>

                       </div>
                       <div className="glass-panel rounded-xl p-4">
                           <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Targets</div>

                               {(detail.targets || []).map((target) => (
                                   <span key={target} className="px-2 py-1 rounded-full text-xs bg-teal-100/70 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300 border border-teal-200/60 dark:border-teal-800/60">{target}</span>
                               ))}
                           </div>

                if (diffSec < 60) return `${diffSec}s ago`;
                const diffMin = Math.floor(diffSec / 60);
                if (diffMin < 60) return `${diffMin}m ago`;
                const diffHr = Math.floor(diffMin / 60);

                return {

                return RECALL_DEFAULT_CADENCE_DAYS;
            };

            const createRecallTask = (patient, overrides = {}) => ({
                recallId: overrides.recallId || `rec_${Date.now()}_${patient.id}`,
                patientId: patient.id,
                patientName: patient.name,
                dueDate: overrides.dueDate || toIsoDate(withDays(new Date(), getRecallCadenceDays(patient))),
                reason: overrides.reason || (patient.status === 'Discharged' ? 'Post-discharge recall' : 'Inactive patient follow-up'),
                channel: overrides.channel || RECALL_DEFAULT_CHANNEL,
                status: overrides.status || 'pending',
                response: overrides.response || 'awaiting-response',
                createdAt: overrides.createdAt || new Date().toISOString(),
                lastContactAt: overrides.lastContactAt || null,
                bookedAt: overrides.bookedAt || null,
                closedAt: overrides.closedAt || null
            });

            const ensureRecallTask = (patient, overrides = {}) => {
                if (!patient) return false;
                const reason = overrides.reason || (patient.status === 'Discharged' ? 'Post-discharge recall' : 'Inactive patient follow-up');
                let created = false;
                let dueDate = overrides.dueDate || toIsoDate(withDays(new Date(), getRecallCadenceDays(patient)));

                setRecallTasks((prev) => {
                    const existing = prev.find((task) => Number(task.patientId) === Number(patient.id) && String(task.reason || '') === reason && !['closed', 'booked'].includes(String(task.status || '')));
                    if (existing) {
                        dueDate = existing.dueDate || dueDate;
                        return prev;
                    }
                    created = true;
                    return [createRecallTask(patient, { ...overrides, dueDate, reason }), ...prev];
                });

                if (created && !overrides.silent) {
                    setNotifications((prev) => {
                        const exists = prev.some((notification) => notification.type === 'recall' && Number(notification.patientId) === Number(patient.id) && String(notification.title || '').toLowerCase().includes('recall'));
                        if (exists) return prev;
                        return [{
                            id: Date.now() + patient.id,
                            type: 'recall',
                            title: 'Patient Recall Needed',
                            desc: `${patient.name} is due for follow-up by ${dueDate}.`,
                            patientId: patient.id
                        }, ...prev];
                    });
                }

                return created;
            };

            const updateRecallTaskStatus = (recallId, status) => {
                const nowIso = new Date().toISOString();
                setRecallTasks((prev) => prev.map((task) => {
                    if (task.recallId !== recallId) return task;
                    return {
                        ...task,
                        status,
                        response: status === 'contacted' ? 'contacted-awaiting-response' : status === 'booked' ? 'appointment-booked' : status === 'closed' ? 'closed-no-booking' : task.response,
                        lastContactAt: status === 'contacted' ? nowIso : task.lastContactAt,
                        bookedAt: status === 'booked' ? nowIso : task.bookedAt,
                        closedAt: status === 'closed' ? nowIso : task.closedAt
                    };
                }));
            };

            const getWaitlistPriorityRank = (priority) => ({ high: 0, medium: 1, low: 2 }[String(priority || '').toLowerCase()] ?? 3);

            const sortedWaitlistRequests = [...waitlistRequests].sort((a, b) => {
                const rankDiff = getWaitlistPriorityRank(a.priority) - getWaitlistPriorityRank(b.priority);
                if (rankDiff !== 0) return rankDiff;
                return String(a.patientName || '').localeCompare(String(b.patientName || ''));
            });

            const parseClockToMinutes = (value) => {
                const match = String(value || '').match(/^(\d{1,2}):(\d{2})$/);
                if (!match) return 0;
                return (Number(match[1]) * 60) + Number(match[2]);
            };

            const formatMinutesToClock = (minutes) => {
                const hrs = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
            };

            const isWeekday = (date) => {
                const day = new Date(date).getDay();
                return day >= 1 && day <= 5;
            };

            const overlapsRange = (startA, endA, startB, endB) => startA < endB && startB < endA;

            const getCapacityAppointmentsForDate = (dateIso) => (
                appointments.filter((appt) => String(appt.date) === String(dateIso) && ['confirmed', 'blocked', 'no-show'].includes(String(appt.status || '')))
            );

            const getDailyVisitCount = (dateIso) => (
                getCapacityAppointmentsForDate(dateIso).filter((appt) => !!appt.patientId && String(appt.status || '') === 'confirmed').length
            );

            const getOpenSlotsForDate = (dateIso, duration = 30, options = {}) => {
                if (!dateIso || !isWeekday(dateIso)) return [];
                const step = Math.max(15, Number(capacitySettings.slotStepMinutes || 30));
                const slotDuration = Math.max(step, Number(duration || 30));
                const dayVisits = getDailyVisitCount(dateIso);
                const reserveCount = Math.max(0, Number(capacitySettings.urgentReserveSlots || 0));
                const maxVisits = Math.max(1, Number(capacitySettings.maxDailyVisits || 12));
                const startMinutes = Number(capacitySettings.workdayStartHour || 9) * 60;
                const endMinutes = Number(capacitySettings.workdayEndHour || 18) * 60;
                const lunchStart = parseClockToMinutes(capacitySettings.lunchStart || '12:00');
                const lunchEnd = parseClockToMinutes(capacitySettings.lunchEnd || '13:00');
                const blockedIntervals = getCapacityAppointmentsForDate(dateIso).map((appt) => {
                    const start = parseClockToMinutes(appt.time || '00:00');
                    return { start, end: start + Number(appt.duration || 30) };
                });
                const slots = [];

                for (let start = startMinutes; start + slotDuration <= endMinutes; start += step) {
                    const end = start + slotDuration;
                    if (overlapsRange(start, end, lunchStart, lunchEnd)) continue;
                    if (blockedIntervals.some((interval) => overlapsRange(start, end, interval.start, interval.end))) continue;
                    slots.push({ date: dateIso, time: formatMinutesToClock(start), duration: slotDuration });
                }

                if (dayVisits >= maxVisits) return [];
                if (options.includeReserve) return slots;
                if (slots.length <= reserveCount) return [];
                return slots.slice(0, Math.max(0, slots.length - reserveCount));
            };

            const getCapacitySummaryForDate = (dateIso) => {
                const booked = getDailyVisitCount(dateIso);
                const capacity = Math.max(1, Number(capacitySettings.maxDailyVisits || 12));
                const openSlots = getOpenSlotsForDate(dateIso, 30).length;
                const utilization = Math.min(100, Math.round((booked / capacity) * 100));
                return { booked, capacity, openSlots, utilization };
            };

            const getUpcomingScheduleDates = (count = 10) => {
                const dates = [];
                let cursor = toDateOnly(new Date());
                while (dates.length < count) {
                    if (isWeekday(cursor)) dates.push(toIsoDate(cursor));
                    cursor = addDaysToDate(cursor, 1);
                }
                return dates;
            };

            const getRecommendedSlots = ({ duration = 30, includeReserve = false, count = 5 } = {}) => {
                const results = [];
                const upcomingDates = getUpcomingScheduleDates(10);
                for (const dateIso of upcomingDates) {
                    const summary = getCapacitySummaryForDate(dateIso);
                    const daySlots = getOpenSlotsForDate(dateIso, duration, { includeReserve }).map((slot) => ({
                        ...slot,
                        utilization: summary.utilization,
                        label: `${dateIso} · ${slot.time}`
                    }));
                    results.push(...daySlots);
                    if (results.length >= count) break;
                }
                return results.slice(0, count);
            };

            const getSuggestedSlotForRequest = (req, options = {}) => {
                const isEmergency = String(req?.type || '').toLowerCase() === 'emergency';
                return getRecommendedSlots({ duration: 30, includeReserve: isEmergency || options.includeReserve, count: 1 })[0] || null;
            };

            const getSelectedBookingSlotHealth = () => {
                const summary = getCapacitySummaryForDate(bookingDateDraft);
                const slots = getOpenSlotsForDate(bookingDateDraft, Number(bookingDurationDraft || 30), { includeReserve: false });
                const exactAvailable = slots.some((slot) => slot.time === bookingTimeDraft);
                return { ...summary, exactAvailable };
            };

            const autoFillNextOpenSlot = () => {
                const candidate = sortedWaitlistRequests[0];
                const slot = getRecommendedSlots({ duration: 30, count: 1 })[0];
                if (!candidate || !slot) {
                    triggerToast('No waitlist candidate or open slot available.');
                    return;
                }
                setBookingRequests((prev) => ([{
                    id: Date.now(),
                    patientName: candidate.patientName,
                    reqTime: `${slot.date} at ${slot.time}`,
                    reason: `${candidate.reason} · Auto-filled by capacity engine`,
                    type: 'Waitlist'
                }, ...prev]));
                setWaitlistRequests((prev) => prev.filter((row) => String(row.id) !== String(candidate.id)));
                triggerToast(`Open slot ${slot.time} on ${slot.date} offered to ${candidate.patientName}.`);
            };

            const promoteWaitlistRequest = (waitlistId) => {
                const item = waitlistRequests.find((row) => String(row.id) === String(waitlistId));
                if (!item) return;
                const suggestedSlot = getSuggestedSlotForRequest({ type: item.priority === 'high' ? 'Emergency' : 'Waitlist' });
                setBookingRequests((prev) => ([{
                    id: Date.now(),
                    patientName: item.patientName,
                    reqTime: suggestedSlot ? `${suggestedSlot.date} at ${suggestedSlot.time}` : item.requestedWindow,
                    reason: item.reason,
                    type: 'Waitlist'
                }, ...prev]));
                setWaitlistRequests((prev) => prev.filter((row) => String(row.id) !== String(waitlistId)));
                triggerToast(`${item.patientName} moved from waitlist to booking requests.`);
            };

            const removeWaitlistRequest = (waitlistId) => {
                setWaitlistRequests((prev) => prev.filter((row) => String(row.id) !== String(waitlistId)));
                triggerToast('Waitlist entry removed.');
            };

            const openRecallBooking = (patientId) => {
                const patient = getPatientById(patientId);
                if (!patient) return;
                const suggested = getRecommendedSlots({ duration: Number(bookingDurationDraft || 30), count: 1 })[0];
                setActiveTab('schedule');
                setBookingPatientSelection(String(patient.id));
                setBookingDateDraft(suggested?.date || toIsoDate(scheduleAnchorDate || new Date()));
                setBookingTimeDraft(suggested?.time || '09:00');
                setBookingTypeDraft('Follow-up');
                setShowBookingModal(true);
            };

            const escapeHtml = (value) => String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

            const renderPrintDocument = ({ title, subtitle, metaRows, body, footerLines = [] }) => `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>${escapeHtml(title)}</title>
    <style>
        body { font-family: Georgia, "Times New Roman", serif; color: #0f172a; margin: 0; background: #ffffff; }
        .page { width: 210mm; min-height: 297mm; margin: 0 auto; padding: 16mm 18mm; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; gap: 24px; border-bottom: 2px solid #0f172a; padding-bottom: 12px; margin-bottom: 18px; }
        .brand { font-size: 12px; line-height: 1.5; }
        .title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
        .subtitle { font-size: 12px; color: #475569; margin: 0; }
        .meta { width: 100%; border-collapse: collapse; margin: 16px 0 22px; }
        .meta td { font-size: 12px; padding: 6px 8px; border: 1px solid #cbd5e1; vertical-align: top; }
        .meta td:first-child { width: 28%; font-weight: 700; background: #f8fafc; }
        .body { white-space: pre-wrap; font-size: 13px; line-height: 1.65; min-height: 360px; }
        .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #cbd5e1; font-size: 11px; color: #475569; line-height: 1.6; }
        @media print { .page { margin: 0; } }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <h1 class="title">${escapeHtml(title)}</h1>
                <p class="subtitle">${escapeHtml(subtitle || '')}</p>
            </div>
            <div class="brand">
                <strong>${escapeHtml(physioProfile.clinicName)}</strong><br />
                ${escapeHtml(physioProfile.address)}<br />
                ${escapeHtml(physioProfile.city)}, ${escapeHtml(physioProfile.country)}<br />
                ${escapeHtml(physioProfile.phone)}
            </div>
        </div>
        <table class="meta">
            <tbody>
                ${(metaRows || []).map((row) => `<tr><td>${escapeHtml(row.label)}</td><td>${escapeHtml(row.value)}</td></tr>`).join('')}
            </tbody>
        </table>
        <div class="body">${escapeHtml(body)}</div>
        <div class="footer">${(footerLines || []).map((line) => `<div>${escapeHtml(line)}</div>`).join('')}</div>
    </div>
</body>
</html>`;

            const buildSoapPrintPacket = (patient) => ({
                title: docLanguage === 'fr' ? 'Note SOAP' : 'SOAP Note',
                subtitle: `${patient?.name || 'Patient'} · ${patient?.diagnosis || 'Clinical follow-up'}`,
                metaRows: [
                    { label: docLanguage === 'fr' ? 'Patient' : 'Patient', value: patient?.name || 'Not selected' },
                    { label: docLanguage === 'fr' ? 'Date' : 'Date', value: soapMeta.date || toIsoDate(new Date()) },
                    { label: docLanguage === 'fr' ? 'Suivi' : 'Follow-up', value: soapMeta.followUp || 'Not scheduled' },
                    { label: docLanguage === 'fr' ? 'Motif' : 'Reason', value: soapMeta.reason || patient?.condition_detail || patient?.diagnosis || '-' }
                ],
                body: [
                    `${DOC_COPY[docLanguage]?.subjective || 'Subjective'}\n${soapData.s || '-'}`,
                    `${DOC_COPY[docLanguage]?.objective || 'Objective'}\n${soapData.o || '-'}`,
                    `${DOC_COPY[docLanguage]?.assessment || 'Assessment'}\n${soapData.a || '-'}`,
                    `${DOC_COPY[docLanguage]?.plan || 'Plan'}\n${soapData.p || '-'}`
                ].join('\n\n'),
                footerLines: [
                    `${physioProfile.title} ${physioProfile.firstName} ${physioProfile.lastName}`,
                    `${physioProfile.licenseId} · ${physioProfile.email}`
                ]
            });

            const buildBilanPrintPacket = (patient) => ({
                title: 'Bilan BDK',
                subtitle: `${patient?.name || 'Patient'} · ${patient?.diagnosis || 'Assessment summary'}`,
                metaRows: [
                    { label: 'Patient', value: patient?.name || 'Not selected' },
                    { label: 'Date', value: bilanMeta.date || toIsoDate(new Date()) },
                    { label: 'Episode CNS', value: bilanData.linkedCnsEpisode || patient?.cnsEpisode?.diagnosisCode || 'Private / uncovered' },
                    { label: 'Checkpoint', value: bilanData.renewalCheckpoint || 'Initial BDK' }
                ],
                body: [
                    `Working diagnosis\n${bilanData.workingDiagnosis || '-'}`,
                    `Clinical reasoning\n${bilanData.clinicalReasoningSummary || '-'}`,
                    `History\n${bilanData.history || '-'}`,
                    `Functional limitations\n${bilanData.functionalLimitations || '-'}`,
                    `Goals\n${bilanData.measurableGoals || '-'}`,
                    `ROM\nFlexion ${bilanData.romFlexAct || '-'} / ${bilanData.romFlexPas || '-'}\nExtension ${bilanData.romExtAct || '-'} / ${bilanData.romExtPas || '-'}\nAbduction ${bilanData.romAbdAct || '-'} / ${bilanData.romAbdPas || '-'}`,
                    `Strength\nQuadriceps ${bilanData.quadStrength || '-'}\nHamstrings ${bilanData.hamStrength || '-'}\nGlute med ${bilanData.gluteStrength || '-'}`,
                    `Red flags\n${(bilanData.redFlags || []).length ? bilanData.redFlags.join(', ') : 'None noted'}`,
                    `Treatment plan / prognosis\nFrequency: ${bilanData.treatmentFrequency || '-'}\nPrognosis: ${bilanData.prognosis || '-'}`
                ].join('\n\n'),
                footerLines: [
                    `${physioProfile.title} ${physioProfile.firstName} ${physioProfile.lastName}`,
                    `${physioProfile.clinicName} · ${physioProfile.licenseId}`
                ]
            });

            const buildReportPrintPacket = (patient, mode = reportMode) => {
                const modeMeta = mode === 'initial'
                    ? { title: 'Compte Rendu Initial', subtitle: 'Initial physician communication' }
                    : mode === 'discharge'
                        ? { title: 'Compte Rendu de Sortie', subtitle: 'Discharge / closure communication' }
                        : { title: 'Compte Rendu d\'Evolution', subtitle: 'Progress physician communication' };
                const recommendation = mode === 'discharge' ? 'decharger' : getReportRecommendation(patient);
                const reportText = reportDraft || buildCompteRenduDraft(patient, recommendation);
                return {
                    title: modeMeta.title,
                    subtitle: modeMeta.subtitle,
                    metaRows: [
                        { label: 'Patient', value: patient?.name || 'Not selected' },
                        { label: 'Date', value: toIsoDate(new Date()) },
                        { label: 'Reference CNS', value: patient?.cnsEpisode?.ordonnanceReference || patient?.cnsEpisode?.diagnosisCode || 'To complete' },
                        { label: 'Prescripteur', value: patient?.physician?.name || patient?.cnsEpisode?.prescriber || 'Docteur prescripteur' }
                    ],
                    body: reportText,
                    footerLines: [
                        `${physioProfile.title} ${physioProfile.firstName} ${physioProfile.lastName}`,
                        `${physioProfile.clinicName} · ${physioProfile.phone}`
                    ]
                };
            };

            const printClinicalDocument = () => {
                const patient = getDocPatient();
                const packet = clinicalDocType === 'soap'
                    ? buildSoapPrintPacket(patient)
                    : clinicalDocType === 'bilan'
                        ? buildBilanPrintPacket(patient)
                        : buildReportPrintPacket(patient, reportMode);
                const printWindow = window.open('', '_blank', 'width=960,height=720');
                if (!printWindow) {
                    triggerToast('Allow pop-ups to print the clinical document.');
                    return;
                }
                printWindow.document.open();
                printWindow.document.write(renderPrintDocument(packet));
                printWindow.document.close();
                printWindow.focus();
                window.setTimeout(() => printWindow.print(), 250);
            };

            const sendCurrentReport = async () => {
                const patient = getDocPatient();
                if (!patient) return;
                const packet = buildReportPrintPacket(patient, reportMode);
                const sharedPatientId = getSharedPatientId(patient);
                await VerveAPI.post('/clinical/report-send', {
                    patientId: sharedPatientId,
                    mode: reportMode,
                    subject: packet.title,
                    body: packet.body
                });
                window.VerveAudit?.log?.(clinicianActor.actorId, 'report.secure-send.queued', `Queued ${packet.title} for ${patient.name}`, sharedPatientId);
                triggerToast(`${packet.title} queued for secure send.`);
            };

            const getAppointmentFee = (appt) => {
                const type = String(appt?.type || '').toLowerCase();
                if (!appt?.patientId || ['lunch', 'block'].includes(type)) return 0;
                return type.includes('video') ? parseFee(physioProfile.videoFee) : parseFee(physioProfile.inPersonFee);
            };

            const markInvoicePaid = (invoiceId) => {
                setInvoices((prev) => prev.map((inv) => (
                    inv.id === invoiceId
                        ? { ...inv, status: 'paid', paidDate: toIsoDate(new Date()) }
                        : inv
                )));
                triggerToast(`Invoice #${invoiceId} marked as paid.`);
            };

            const resendInvoice = (invoiceId) => {
                setInvoices((prev) => prev.map((inv) => (
                    inv.id === invoiceId && inv.status !== 'paid' ? { ...inv, status: 'sent' } : inv
                )));
                triggerToast(`Invoice #${invoiceId} re-sent.`);
            };

            const syncPatientClinicalState = (patientId, { constraints, goals, emitType, payload }) => {
                const patient = getPatientById(patientId);
                if (!patient || !window.VerveSync) return;
                const sharedId = getSharedPatientId(patient);
                const existingPatient = window.VerveSync.getEntities('patients')?.[sharedId] || {};
                const episodeId = `ep_${sharedId}`;
                const existingEpisode = window.VerveSync.getEntities('episodes')?.[episodeId] || {};

                window.VerveSync.upsertEntity('patients', {
                    ...existingPatient,
                    patientId: sharedId,
                    primaryDx: patient.diagnosis,
                    constraints: Array.isArray(constraints) ? constraints : (existingPatient.constraints || []),
                    updatedAt: window.VerveSync.nowIso(),
                    createdAt: existingPatient.createdAt || window.VerveSync.nowIso(),
                    primaryClinicianId: clinicianActor.actorId
                }, 'patientId');

                window.VerveSync.upsertEntity('episodes', {
                    ...existingEpisode,
                    episodeId,
                    patientId: sharedId,
                    goals: Array.isArray(goals) ? goals : (existingEpisode.goals || []),
                    phase: existingEpisode.phase || 'acute',
                    riskLevel: existingEpisode.riskLevel || 'medium',
                    startDate: existingEpisode.startDate || '2026-01-01',
                    updatedAt: window.VerveSync.nowIso(),
                    createdAt: existingEpisode.createdAt || window.VerveSync.nowIso()
                }, 'episodeId');

                if (emitType) {
                    window.VerveSync.emitEvent(emitType, {
                        patientId: sharedId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'ClinicalUpdate',
                        entityId: `clinical_${patientId}_${Date.now()}`,
                        payload: payload || {}
                    });
                }
            };

            const upsertPatientConstraints = (patientId, nextConstraints, reason) => {
                const previousConstraints = getPatientById(patientId)?.constraints || [];
                updatePatientPatch(patientId, { constraints: nextConstraints });
                if (selectedPatient?.id === patientId) setSelectedPatient(prev => ({ ...prev, constraints: nextConstraints }));
                syncPatientClinicalState(patientId, {
                    constraints: nextConstraints,
                    emitType: 'constraint.updated',
                    payload: {
                        reason,
                        previous: { constraints: previousConstraints },
                        current: { constraints: nextConstraints },
                        constraints: nextConstraints
                    }
                });
                window.VerveAudit?.log?.(clinicianActor.actorId, 'constraint.updated', `Updated constraints (${reason || 'manual'})`, getSharedPatientId(getPatientById(patientId)));
            };

            const SB_TYPE_MAP = { blocked: 'blocked_movement', rom: 'rom_limit', load: 'load_limit' };
            const SB_SEVERITY_MAP = { blocked: 'hard', load: 'soft', rom: 'advisory' };
            const toSbConstraint = (c, patientUuid, physioId) => ({
                patient_id: patientUuid,
                physio_id: physioId,
                constraint_type: SB_TYPE_MAP[String(c.type || '').toLowerCase()] || 'blocked_movement',
                target: String(c.target || c.val || '').trim(),
                value: String(c.val || '').trim() || null,
                severity: SB_SEVERITY_MAP[String(c.type || '').toLowerCase()] || 'hard',
                notes: String(c.notes || '').trim() || null,
                status: 'active',
            });
            const logSbEvent = async (constraintId, patientUuid, eventType, metadata = {}) => {
                if (!sbReady() || !sbPhysioId.current) return;
                await sbClient.from('constraint_events').insert({
                    constraint_id: constraintId, patient_id: patientUuid,
                    event_type: eventType, actor_id: sbPhysioId.current, metadata,
                });
            };

            const addConstraintForPatient = (patientId) => {
                const type = String(constraintDraft.type || '').trim();
                const val = String(constraintDraft.val || '').trim();
                if (!type || !val) return;
                const target = String(constraintDraft.target || '').trim();
                const notes = String(constraintDraft.notes || '').trim();
                const newItem = { type, val, target, notes };
                const existing = getPatientById(patientId)?.constraints || [];
                const next = [...existing, newItem];
                upsertPatientConstraints(patientId, next, 'manual_add');
                setConstraintDraft(prev => ({ ...prev, val: '', target: '', notes: '' }));
                triggerToast('Constraint added and synced.');
                void (async () => {
                    try {
                        if (!sbReady() || !sbPhysioId.current) return;
                        const uuid = livePatientUuid(patientId);
                        if (!uuid) return;
                        const { data, error } = await sbClient
                            .from('clinical_constraints')
                            .insert(toSbConstraint(newItem, uuid, sbPhysioId.current))
                            .select()
                            .single();
                        if (error) throw error;
                        newItem.remoteId = data.id;
                        const patched = [...(getPatientById(patientId)?.constraints || [])];
                        const idx = patched.findIndex(c => c === newItem || (!c.remoteId && c.type === newItem.type && c.val === newItem.val && c.target === newItem.target && c.notes === newItem.notes));
                        if (idx >= 0) {
                            patched[idx] = { ...patched[idx], remoteId: data.id };
                            upsertPatientConstraints(patientId, patched, 'remote_sync');
                        }
                        await logSbEvent(data.id, uuid, 'created', { type: newItem.type, target: newItem.target });
                    } catch (err) {
                        console.warn('[verve] constraint live sync failed', err);
                        triggerToast('Live sync failed — saved locally.');
                    }
                })();
            };

            const updateConstraintForPatient = (patientId, index, patch) => {
                const existing = [...(getPatientById(patientId)?.constraints || [])];
                if (!existing[index]) return;
                const updated = { ...existing[index], ...patch };
                existing[index] = updated;
                upsertPatientConstraints(patientId, existing, 'manual_edit');
                void (async () => {
                    try {

                            sbClient.from('clinical_constraints').select('id, constraint_type, target, value, status').eq('patient_id', uuid),

                    } catch (err) {
                        console.warn('[verve] propagation fetch failed', err);
                    }
                })();
                const channel = sbClient.channel('constraint-events:' + uuid)
                    .on('postgres_changes',
                        { event: 'INSERT', schema: 'public', table: 'constraint_events', filter: 'patient_id=eq.' + uuid },
                        (payload) => {
                            const ev = payload.new;
                            setPropagationEvents(prev => [ev, ...prev]);

                    if (!(event.ctrlKey || event.metaKey)) return;

                    const tabMap = {

                        '2': 'patients',
                        '3': 'schedule',

                    };

                    if (tabMap[key]) {

                                title: 'Booking confirmed',
                                desc: `Confirmation propagated to patient for ${date}.`,
                                patientId: localId
                            },
                            ...prev
                        ]));
                    }

                    if (evt.type === 'patient.discharged') {
                        const summary = evt.payload?.record?.summary || evt.payload?.summary || 'Discharge completed.';
                        setNotifications(prev => ([
                            {
                                id: Date.now() + 5,
                                type: 'alert',
                                title: 'Discharge propagated',
                                desc: summary,
                                patientId: localId
                            },
                            ...prev
                        ]));
                    }

                    if (evt.type === 'constraint.updated') {
                        const prev = evt.payload?.previous || {};
                        const curr = evt.payload?.current || evt.payload || {};
                        const bits = [];
                        if (prev.maxLoad !== curr.maxLoad && (prev.maxLoad !== undefined || curr.maxLoad !== undefined)) bits.push(`Load ${prev.maxLoad ?? '?'} -> ${curr.maxLoad ?? '?'}`);
                        if (prev.phase !== curr.phase && (prev.phase !== undefined || curr.phase !== undefined)) bits.push(`Phase ${prev.phase ?? '?'} -> ${curr.phase ?? '?'}`);
                        if (prev.avoidMovements !== curr.avoidMovements && (prev.avoidMovements !== undefined || curr.avoidMovements !== undefined)) bits.push(`Avoid ${curr.avoidMovements || 'updated'}`);

                        setNotifications(prevList => ([
                            {
                                id: Date.now() + 6,
                                type: 'alert',
                                title: 'Constraint change',
                                desc: bits.length ? bits.join(' | ') : (evt.payload?.reason || 'Constraint modified.'),
                                patientId: localId
                            },
                            ...prevList
                        ]));
                    }

                    if (['constraint.updated', 'goal.updated', 'trainer.feedback.actioned'].includes(evt.type)) {
                        refreshPatientsFromShared();
                    }

                    if (evt.type === 'message.sent' && evt.actorType === 'patient') {
                        setNotifications(prev => ([
                            {
                                id: Date.now() + 2,
                                type: 'message',
                                title: 'New message',
                                desc: evt.payload?.message?.body || 'New patient message received.',
                                patientId: localId
                            },
                            ...prev
                        ]));
                    }
                });

                return () => {
                    try { unsubscribe && unsubscribe(); } catch {}
                };
            }, []);

            useEffect(() => {
                if (!selectedPatient) return;
                const refreshed = patients.find(p => p.id === selectedPatient.id);
                if (refreshed) setSelectedPatient(refreshed);
            }, [patients]);

            const triggerToast = (msg) => {
                setToastMsg(msg);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3000);
            };

            const handleReferToTrainer = (referral) => {
                const { patientId, trainerId, trainerName, handoffNote, blockedExercises, romLimits, status: clearanceStatus } = referral;
                setPatients(prev => prev.map(p => {
                    if (p.id !== patientId) return p;
                    const alreadyLinked = (p.sharedWith || []).some(t => t.trainerId === trainerId);
                    if (alreadyLinked) return p;
                    return {
                        ...p,
                        status: clearanceStatus,
                        sharedWith: [...(p.sharedWith || []), {
                            trainerId,
                            trainerName,
                            since: new Date().toISOString().split('T')[0],
                            handoffNote,
                            blockedExercises,
                            romLimits
                        }]
                    };
                }));
                if (selectedPatient && selectedPatient.id === patientId) {
                    setSelectedPatient(prev => ({
                        ...prev,
                        status: clearanceStatus,
                        sharedWith: [...(prev.sharedWith || []), {
                            trainerId,
                            trainerName,
                            since: new Date().toISOString().split('T')[0],
                            handoffNote,
                            blockedExercises,
                            romLimits
                        }]
                    }));
                }
                triggerToast(`Referred to ${trainerName} — constraints propagated`);
                setReferToTrainerModal(null);
            };

            const dismissNotification = (id) => {
                setNotifications(notifications.filter(n => n.id !== id));
                setDismissedNotificationIds((prev) => Array.from(new Set([...(prev || []), id])));
            };

            const getNotificationPriority = (n) => {
                const desc = String(n?.desc || '').toLowerCase();
                if (n.type === 'alert' && (desc.includes('pain') || desc.includes('spike') || desc.includes('urgent'))) return 1;
                if (n.type === 'alert') return 2;
                if (n.type === 'request') return 3;
                if (n.type === 'feedback') return 4;
                if (n.type === 'recall') return 5;
                if (n.type === 'message') return 6;
                return 7;
            };

            const getPrioritizedNotifications = (arr) =>
                (arr || [])
                    .map((n, idx) => ({ n, idx, p: getNotificationPriority(n) }))
                    .sort((a, b) => a.p - b.p || a.idx - b.idx)
                    .map(({ n }) => n);

            // Logic: Cycle Status
            const cycleStatus = (e, id) => {
                e.stopPropagation();
                const statusMap = { 'Restricted': 'Modified', 'Modified': 'Cleared', 'Cleared': 'Restricted', 'Maintenance': 'Restricted' };
                setPatients(prev => prev.map(p => {
                    if (p.id === id) {
                        const newStatus = statusMap[p.status] || 'Restricted';
                        if (selectedPatient?.id === id) setSelectedPatient({ ...p, status: newStatus });
                        triggerToast(`Status updated to ${newStatus}`);
                        return { ...p, status: newStatus };
                    }
                    return p;
                }));
            };

            const movePatientToStatus = (patientId, status) => {
                setPatients((prev) => prev.map((p) => p.id === patientId ? { ...p, status } : p));
                if (selectedPatient?.id === patientId) {
                    setSelectedPatient((prev) => ({ ...prev, status }));
                }
                triggerToast(`Patient moved to ${status}.`);
            };

            // Logic: Set hotspot status directly (clear | sore | acute)
            const setHotspot = (zoneId, status) => {
                const p = selectedPatient;
                if (!p) return;

                const newHotspots = { ...p.hotspots };
                if (status) newHotspots[zoneId] = status;
                else delete newHotspots[zoneId];

                const updatedPatients = patients.map(pat => {
                    if (pat.id === p.id) {
                        const nextHistory = {
                            ...(pat.hotspotHistory || {}),
                            [zoneId]: [
                                ...((pat.hotspotHistory || {})[zoneId] || []),
                                {
                                    status: status || 'clear',
                                    changedAt: new Date().toISOString(),
                                    changedBy: 'physio'
                                }
                            ]
                        };
                        const updated = { ...pat, hotspots: newHotspots, hotspotHistory: nextHistory };
                        setSelectedPatient(updated);
                        return updated;
                    }
                    return pat;
                });
                setPatients(updatedPatients);
            };

            const resolvePainZoneId = ({ bodyPart, region }) => {
                const raw = String(bodyPart || region || '').toLowerCase();
                if (!raw) return null;
                if (raw.includes('knee')) return raw.includes('left') ? 'knee_l' : 'knee_r';
                if (raw.includes('shoulder')) return raw.includes('left') ? 'shoulder_l' : 'shoulder_r';
                if (raw.includes('ankle')) return raw.includes('left') ? 'ankle_l' : 'ankle_r';
                if (raw.includes('back') || raw.includes('lumbar')) return 'back';
                if (raw.includes('hip') || raw.includes('glute')) return raw.includes('left') ? 'hip_l' : 'hip_r';
                return raw.replace(/\s+/g, '_');
            };

            const getPatientTimeline = (patient) => {
                if (!patient) return [];
                const sharedId = getSharedPatientId(patient);

                const adherence = Object.values(window.VerveSync?.getEntities('adherenceLogs') || {})
                    .filter((l) => String(l.patientId) === String(sharedId))
                    .map((l) => ({
                        id: l.logId || `adherence_${l.loggedAt}`,
                        source: 'user',
                        label: 'Session Logged',
                        description: `Dose ${l.doseDone?.sets || '-'}x${l.doseDone?.reps || '-'}${Number.isFinite(Number(l.painAfter)) ? ` · Pain ${l.painAfter}/10` : ''}`,
                        time: l.loggedAt || l.date
                    }));

                const soapEvents = soapRecords
                    .filter((r) => Number(r.patientId) === Number(patient.id))
                    .map((r) => ({
                        id: r.noteId,
                        source: 'physio',
                        label: 'SOAP Note',
                        description: r.reason || 'Clinical progress note saved.',
                        time: r.savedAt || r.date
                    }));

                const bilanEvents = bilanRecords
                    .filter((r) => Number(r.patientId) === Number(patient.id))
                    .map((r) => ({
                        id: r.bilanId,
                        source: 'physio',
                        label: 'Bilan Assessment',
                        description: r.data?.workingDiagnosis || 'Assessment updated.',
                        time: r.savedAt || r.date
                    }));

                const trainerEvents = (patient.trainerActivity || []).map((entry, idx) => ({
                    id: `trainer_${idx}_${entry.date}`,
                    source: 'trainer',
                    label: entry.sessionName || 'Trainer Session',
                    description: entry.notes || 'Trainer update received.',
                    time: entry.date
                }));

                const dischargeEvents = dischargeRecords
                    .filter((r) => Number(r.patientId) === Number(patient.id))
                    .map((r) => ({
                        id: r.dischargeId,
                        source: 'physio',
                        label: 'Discharged',
                        description: `Follow-up ${r.followUpDate || 'scheduled'}`,
                        time: r.dischargedAt
                    }));

                return [...adherence, ...soapEvents, ...bilanEvents, ...trainerEvents, ...dischargeEvents]
                    .sort((a, b) => toMs(b.time) - toMs(a.time));
            };

            const toDrawerFeedMs = (value, fallbackOffset = 0) => {
                const parsed = toMs(value) || toMs(`${value || ''}, 2026`) || toMs(`${value || ''} 2026`);
                return parsed || (Date.now() - fallbackOffset);
            };

            const getPatientDrawerActivityFeed = (patient) => {
                if (!patient) return [];

                const timelineItems = getPatientTimeline(patient)
                    .filter((item) => item.source !== 'trainer')
                    .map((item, idx) => ({
                        id: `timeline_${item.id}`,
                        source: item.source,
                        label: item.label,
                        description: item.description,
                        meta: item.source === 'physio' ? 'Chart update' : 'App activity',
                        timeLabel: formatSyncedAgo(item.time),
                        sortAt: toDrawerFeedMs(item.time, idx * 1000)
                    }));

                const historyItems = (patient.history || []).map((session, idx) => ({
                    id: `history_${patient.id}_${idx}`,
                    source: 'physio',
                    label: session.name || 'Physio Session',
                    description: `${session.duration || 'Session'}${Number.isFinite(Number(session.pain)) ? ` · Pain ${session.pain}/10` : ''}`,
                    meta: session.date || 'Recent session',
                    timeLabel: session.date || 'Recent',
                    sortAt: toDrawerFeedMs(session.date, 60000 + (idx * 1000))
                }));

                const trainerItems = (patient.trainerActivity || []).map((session, idx) => ({
                    id: `trainer_detail_${patient.id}_${idx}`,
                    source: 'trainer',
                    label: session.sessionName || 'Trainer Session',
                    description: session.notes || 'Trainer update received.',
                    meta: `${session.trainer || 'Trainer'}${Number.isFinite(Number(session.painReported)) ? ` · Pain ${session.painReported}/10` : ''}`,
                    timeLabel: session.date || 'Recent',
                    sortAt: toDrawerFeedMs(session.date, 120000 + (idx * 1000))
                }));

                return [...timelineItems, ...historyItems, ...trainerItems]
                    .sort((a, b) => b.sortAt - a.sortAt);
            };

            const assignPlanToPatient = (patientId, plan, deliveryMethod = 'app') => {
                if (!patientId || !plan) return;
                const updatedExercises = (plan.exercises || []).map((ex) => ({
                    ...ex,
                    completed: Number(ex.completed || 0)
                }));

                setPatients((prev) => prev.map((p) => (
                    p.id === patientId ? { ...p, activeProtocol: updatedExercises } : p
                )));

                const patient = patients.find((p) => p.id === patientId);
                if (window.VerveSync) {
                    const sharedPatientId = getSharedPatientId({ id: patientId });
                    const assignmentId = window.VerveSync.uid('asmt');
                    const createdAt = window.VerveSync.nowIso();
                    const assignment = {
                        assignmentId,
                        patientId: sharedPatientId,
                        episodeId: sharedPatientId ? `ep_${sharedPatientId}` : null,
                        templateId: null,
                        deliveryMethod,
                        status: 'assigned',
                        createdBy: clinicianActor.actorId,
                        title: plan.title || 'Custom Protocol',
                        createdAt,
                        updatedAt: createdAt
                    };
                    window.VerveSync.addEntity('assignments', assignment, 'assignmentId');

                    const prescriptions = updatedExercises.map((ex) => ({
                        prescriptionId: window.VerveSync.uid('rx'),
                        assignmentId,
                        exerciseKey: String(ex.name || '').toLowerCase().replace(/\s+/g, '_'),
                        exerciseName: ex.name,
                        frequency: ex.freq || '1x/day',
                        sets: ex.sets,
                        reps: ex.reps,
                        notes: ex.notes || '',
                        createdAt,
                        updatedAt: createdAt
                    }));
                    prescriptions.forEach((rx) => window.VerveSync.addEntity('prescriptions', rx, 'prescriptionId'));
