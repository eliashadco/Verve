                    window.VerveSync.emitEvent('protocol.assigned', {
                        patientId: sharedPatientId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'ProtocolAssignment',
                        entityId: assignmentId,
                        payload: { assignment, prescriptions }
                    });
                    VerveAPI.post('/clinical/protocol-assigned', {
                        patientId: sharedPatientId,
                        assignment,
                        prescriptions,
                        deliveryMethod
                    });
                }

                if (deliveryMethod === 'email') {
                    queueOutboundNotification({
                        channel: 'email',
                        patient,
                        subject: 'Your updated rehab protocol',
                        body: `${plan.title || 'Custom protocol'} is ready in your portal.`
                    });
                }
                if (deliveryMethod === 'print') {
                    window.print();
                }

                triggerToast(`Assigned '${plan.title || 'Custom Protocol'}' to ${patient?.name || 'patient'}`);
            };

            // Logic: Open Muscle Detail
            const openMuscleDetail = (zoneId, label) => {
                setMuscleDetail({ id: zoneId, label: label, note: '' });
            };

            // Logic: Mock AI Suggestion
            const generateAiSuggestion = () => {
                setAiSuggesting(true);
                setTimeout(() => {
                    setAiSuggesting(false);
                    // Mock response
                    const suggestions = [
                        "Target with isometric holds (3x10s) to build tolerance.",
                        "Possible inhibition due to antagonist tightness. Recommend stretching.",
                        "Load management required. Reduce volume by 20%."
                    ];
                    const random = suggestions[Math.floor(Math.random() * suggestions.length)];
                    setMuscleDetail(prev => ({...prev, note: prev.note + (prev.note ? '\n\n' : '') + "AI Suggestion: " + random}));
                }, 1500);
            };

            // Logic: Mock Global AI Analysis
            const triggerGlobalAI = () => {
                setAiAnalysis("Analyzing patient data...");
                setTimeout(() => {
                    setAiAnalysis(
                        "Based on Sarah's MRI (Post-op changes), recent pain spike (7/10 during squats), and high adherence (95%), she is likely overtraining. \n\nRecommendation:\n1. De-load week (-30% intensity).\n2. Focus on glute activation to offload knee.\n3. Re-evaluate graft integrity if pain persists > 3 days."
                    );
                }, 2000);
            };

            // Logic: Protocol Builder (edit sets/reps before assignment)
            const openProtocolBuilder = (patientId, protocol) => {
                if (!protocol || !patientId) return;
                const editableExercises = protocol.exercises.map(ex => ({
                    ...ex,
                    freq: '1x/day',
                    sets: ex.sets,
                    reps: ex.reps
                }));
                setBuilderProtocol({
                    patientId,
                    protocolName: protocol.name,
                    exercises: editableExercises
                });
            };

            const openLibraryBuilder = (patientId, protocol) => {
                if (!protocol) return;
                const patient = patients.find(p => p.id === patientId);
                setLibraryBuilder({
                    protocol,
                    patientName: patient ? patient.name : null,
                    patientId: patient ? patient.id : null
                });
            };

            const handleSaveTemplate = (plan) => {
                if (!plan) return;
                const newTemplate = {
                    id: `custom-${Date.now()}`,
                    name: plan.title || 'Custom Protocol',
                    category: 'Custom',
                    level: 'Template',
                    exercises: plan.exercises || []
                };
                setProtocols(prev => [...prev, newTemplate]);
                triggerToast('Saved as new template');
            };

            const updateBuilderExercise = (index, field, value) => {
                if (!builderProtocol) return;
                const updated = [...builderProtocol.exercises];
                updated[index][field] = value;
                setBuilderProtocol({ ...builderProtocol, exercises: updated });
            };

            const confirmProtocolAssignment = () => {
                if (!builderProtocol) return;
                const { patientId, exercises, protocolName } = builderProtocol;
                const updatedExercises = exercises.map(ex => ({ ...ex, completed: 0 }));

                const updatedPatients = patients.map(p => {
                    if (p.id === patientId) {
                        return { ...p, activeProtocol: [...p.activeProtocol, ...updatedExercises] };
                    }
                    return p;
                });
                setPatients(updatedPatients);

                if (window.VerveSync) {
                    const sharedPatientId = getSharedPatientId({ id: patientId });
                    const assignmentId = window.VerveSync.uid('asmt');
                    const createdAt = window.VerveSync.nowIso();
                    const assignment = {
                        assignmentId,
                        patientId: sharedPatientId,
                        episodeId: sharedPatientId ? `ep_${sharedPatientId}` : null,
                        templateId: null,
                        deliveryMethod: 'app',
                        status: 'assigned',
                        createdBy: clinicianActor.actorId,
                        title: protocolName,
                        createdAt,
                        updatedAt: createdAt
                    };
                    window.VerveSync.addEntity('assignments', assignment, 'assignmentId');

                    const prescriptions = updatedExercises.map(ex => ({
                        prescriptionId: window.VerveSync.uid('rx'),
                        assignmentId,
                        exerciseKey: String(ex.name || '').toLowerCase().replace(/\s+/g, '_'),
                        exerciseName: ex.name,
                        frequency: ex.freq || '1x/day',
                        sets: ex.sets,
                        reps: ex.reps,
                        tempo: ex.tempo || null,
                        restSec: ex.restSec || null,
                        notes: ex.notes || '',
                        createdAt,
                        updatedAt: createdAt
                    }));
                    prescriptions.forEach(rx => window.VerveSync.addEntity('prescriptions', rx, 'prescriptionId'));

                    window.VerveSync.emitEvent('protocol.assigned', {
                        patientId: sharedPatientId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'ProtocolAssignment',
                        entityId: assignmentId,
                        payload: { assignment, prescriptions }
                    });
                }

                const patient = patients.find(p => p.id === patientId);
                triggerToast(`Assigned '${protocolName}' to ${patient ? patient.name : 'patient'}`);
                setBuilderProtocol(null);
            };

            // Logic: Schedule Quick Chat
            const openQuickChat = (patientId, e) => {
                e.stopPropagation();
                const patient = patients.find(p => p.id === patientId);
                if (patient) setQuickChatPatient(patient);
            };

            const sendQuickMessage = (e) => {
                e.preventDefault();
                const text = e.target.msg.value.trim();
                if (!text || !quickChatPatient) return;

                const nowIso = new Date().toISOString();
                const newMsg = { sender: 'me', text, timestamp: nowIso, deliveredAt: nowIso, readAt: null };
                setChats(prev => ({
                    ...prev,
                    [quickChatPatient.id]: [...(prev[quickChatPatient.id] || []), newMsg]
                }));

                if (window.VerveSync) {
                    const sharedPatientId = getSharedPatientId(quickChatPatient);
                    const conversationId = getConversationId(sharedPatientId);
                    window.VerveSync.upsertEntity('conversations', {
                        conversationId,
                        patientId: sharedPatientId,
                        clinicianId: clinicianActor.actorId,
                        topic: 'general',
                        status: 'open',
                        createdAt: window.VerveSync.nowIso()
                    }, 'conversationId');

                    window.VerveSync.addMessage({
                        conversationId,
                        patientId: sharedPatientId,
                        senderId: clinicianActor.actorId,
                        senderType: clinicianActor.actorType,
                        body: text
                    });
                }

                triggerToast(`Message sent to ${quickChatPatient.name}`);
                markPendingMessagesAsRead(quickChatPatient.id);
                setQuickChatPatient(null);
            };

            // Logic: SOAP Macros
            const addSoapMacro = (field, text) => {
                setSoapData(prev => ({
                    ...prev,
                    [field]: prev[field] ? prev[field] + ' ' + text : text
                }));
            };

            const openPatientWorkspace = (view = 'roster', closeSidebar = false) => {
                setPatientWorkspaceView(view);
                setActiveTab('patients');
                if (closeSidebar) setSidebarOpen(false);
            };

            const routeBookingToDocs = (appt) => {
                const patient = patients.find((p) => Number(p.id) === Number(appt?.patientId));
                if (!patient) return;
                openPatientWorkspace('docs');
                setDocPatientId(patient.id);
                const bookingMeta = getBookingTypeMeta(String(appt.type || 'Follow-up'));
                if (bookingMeta.docType === 'bilan') {
                    setClinicalDocType('bilan');
                    setBilanMeta((prev) => ({ ...prev, patientId: patient.id, date: appt.date || toIsoDate(new Date()) }));
                    triggerToast(`${bookingMeta.label} booked: Bilan opened and preloaded.`);
                    return;
                }
                if (bookingMeta.docType === 'soap') {
                    setClinicalDocType('soap');
                    setSoapMeta((prev) => ({
                        ...prev,
                        patientId: patient.id,
                        date: appt.date || toIsoDate(new Date()),
                        followUp: prev.followUp || toIsoDate(withDays(appt.date || new Date(), 14)),
                        reason: prev.reason || 'Scheduled follow-up'
                    }));
                    triggerToast('Follow-up booked: SOAP preloaded.');
                }
            };

            // Logic: Schedule Management
            const acceptRequest = (reqId) => {
                const req = bookingRequests.find(r => r.id === reqId);
                if (!req) return;
                const matchPatient = req ? patients.find(p => p.name === req.patientName) : null;
                const bookingMeta = getBookingTypeMeta(String(req.type || '').toLowerCase() === 'new' ? 'Initial Assessment' : 'Follow-up');
                const suggestedSlot = getSuggestedSlotForRequest(req, { includeReserve: true });
                if (!suggestedSlot) {
                    triggerToast('No capacity-compliant slot is available. Move this request to the waitlist or widen clinic hours.');
                    return;
                }
                const newAppt = {
                    id: Date.now(),
                    patientId: matchPatient?.id || null,
                    time: suggestedSlot.time,
                    date: suggestedSlot.date,
                    type: bookingMeta.label,
                    actCode: bookingMeta.actCode,
                    duration: bookingMeta.defaultDuration,
                    status: "confirmed"
                };
                setAppointments([...appointments, newAppt]);
                setBookingRequests(bookingRequests.filter(r => r.id !== reqId));
                routeBookingToDocs(newAppt);

                if (window.VerveSync && req) {
                    const sharedPatientId = matchPatient ? getSharedPatientId(matchPatient) : null;
                    const bookingRequestId = `br_${req.id}`;
                    const appointmentId = `apt_${newAppt.id}`;

                    window.VerveSync.addEntity('bookingRequests', {
                        bookingRequestId,
                        patientId: sharedPatientId,
                        submittedAt: window.VerveSync.nowIso(),
                        type: (req.type || 'follow_up').toLowerCase(),
                        reason: req.reason || 'Booking request',
                        requestedSlots: [],
                        status: 'accepted'
                    }, 'bookingRequestId');

                    window.VerveSync.addEntity('appointments', {
                        appointmentId,
                        patientId: sharedPatientId,
                        bookingRequestId,
                        start: `${newAppt.date}T${newAppt.time}:00`,
                        end: `${newAppt.date}T${newAppt.time}:00`,
                        location: 'in_person',
                        status: 'scheduled',
                        notes: newAppt.type
                    }, 'appointmentId');

                    window.VerveSync.emitEvent('booking.accepted', {
                        patientId: sharedPatientId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'Appointment',
                        entityId: appointmentId,
                        payload: { bookingRequestId, appointmentId }
                    });

                    window.VerveSync.emitEvent('booking.confirmed', {
                        patientId: sharedPatientId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'Appointment',
                        entityId: appointmentId,
                        payload: {
                            bookingRequestId,
                            appointmentId,
                            date: newAppt.date,
                            time: newAppt.time,
                            slotLabel: `${newAppt.date} ${newAppt.time}`
                        }
                    });

                    window.VerveBus?.emit?.('booking.confirmed', {
                        patientId: sharedPatientId,
                        message: `Your physio confirmed ${newAppt.date} at ${newAppt.time}.`
                    });
                    window.VerveAudit?.log?.(clinicianActor.actorId, 'booking.confirmed', `Confirmed booking for ${req.patientName} on ${newAppt.date} ${newAppt.time}`, sharedPatientId);
                    VerveAPI.post('/clinical/booking-confirmed', {
                        patientId: sharedPatientId,
                        appointmentId,
                        bookingRequestId,
                        date: newAppt.date,
                        time: newAppt.time
                    });
                }
                queueOutboundNotification({
                    channel: 'sms',
                    patient: matchPatient || { name: req.patientName },
                    subject: 'Booking confirmed',
                    body: `Your booking is confirmed for ${newAppt.date} at ${newAppt.time}.`
                });
                triggerToast(`Booking accepted for ${req.patientName}`);
            };

            const declineRequest = (reqId) => {
                setBookingRequests(bookingRequests.filter(r => r.id !== reqId));
                triggerToast("Booking request declined");
            };

            const createBooking = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const selectedPatientRaw = bookingPatientSelection || formData.get('patientId');
                const selectedDuration = parseInt(bookingDurationDraft, 10) || 30;
                if (!bookingDateDraft || !bookingTimeDraft) {
                    triggerToast('Select a valid date and time from the available capacity window.');
                    return;
                }
                if (String(selectedPatientRaw) === 'new') {
                    if (requiresDurationJustification(bookingDurationDraft) && !String(bookingDurationJustification || '').trim()) {
                        triggerToast('Extended sessions require a short clinical justification.');
                        return;
                    }
                    setShowBookingModal(false);
                    openNewPatientFlow({
                        date: bookingDateDraft,
                        time: bookingTimeDraft,
                        type: bookingTypeDraft,
                        duration: selectedDuration,
                        durationJustification: bookingDurationJustification
                    });
                    triggerToast('Complete new patient details to finalize booking.');
                    return;
                }

                if (requiresDurationJustification(bookingDurationDraft) && !String(bookingDurationJustification || '').trim()) {
                    triggerToast('Extended sessions require a short clinical justification.');
                    return;
                }

                const bookingMeta = getBookingTypeMeta(bookingTypeDraft);
                const exactSlotAvailable = getOpenSlotsForDate(bookingDateDraft, selectedDuration, { includeReserve: false }).some((slot) => slot.time === bookingTimeDraft);
                if (!exactSlotAvailable) {
                    triggerToast('That slot is no longer available under the current capacity rules. Pick one of the suggested openings.');
                    return;
                }

                const newAppt = {
                    id: Date.now(),
                    patientId: parseInt(selectedPatientRaw, 10) || null,
                    time: bookingTimeDraft,
                    date: bookingDateDraft,
                    type: bookingMeta.label,
                    actCode: bookingMeta.actCode,
                    duration: selectedDuration,
                    durationJustification: bookingDurationJustification,
                    status: 'confirmed'
                };
                setAppointments([...appointments, newAppt]);
                setShowBookingModal(false);
                setBookingPatientSelection('');
                routeBookingToDocs(newAppt);
                const selectedPatient = patients.find((p) => Number(p.id) === Number(newAppt.patientId));
                const sharedPatientId = selectedPatient ? getSharedPatientId(selectedPatient) : null;
                VerveAPI.post('/clinical/bookings', {
                    patientId: sharedPatientId,
                    date: newAppt.date,
                    time: newAppt.time,
                    type: newAppt.type,
                    actCode: newAppt.actCode,
                    duration: newAppt.duration,
                    durationJustification: newAppt.durationJustification,
                    recurrence: bookingRecurrence
                });
                if (selectedPatient) {
                    setRecallTasks((prev) => prev.map((task) => (
                        Number(task.patientId) === Number(selectedPatient.id) && ['pending', 'contacted'].includes(String(task.status || ''))
                            ? { ...task, status: 'booked', response: 'appointment-booked', bookedAt: new Date().toISOString() }
                            : task
                    )));
                    queueOutboundNotification({
                        channel: 'sms',
                        patient: selectedPatient,
                        subject: 'Booking confirmation',
                        body: `Confirmed for ${newAppt.date} at ${newAppt.time}.`
                    });
                }
                triggerToast(bookingRecurrence === 'none' ? 'New appointment scheduled' : `Recurring schedule (${bookingRecurrence}) queued for production sync`);
            };

            const quickRescheduleAppointment = (appt) => {
                if (!appt || appt.status === 'blocked') return;
                const previousTime = appt.time;
                const nextTime = window.prompt('Reschedule appointment time (HH:MM)', appt.time || '09:00');
                if (!nextTime) return;
                const valid = /^([01]?\d|2[0-3]):([0-5]\d)$/.test(String(nextTime));
                if (!valid) {
                    triggerToast('Invalid time format. Use HH:MM.');
                    return;
                }
                const nextStart = parseClockToMinutes(nextTime);
                const nextEnd = nextStart + Number(appt.duration || 30);
                const conflict = appointments.some((candidate) => {
                    if (candidate.id === appt.id || String(candidate.date) !== String(appt.date) || String(candidate.status || '') === 'cancelled') return false;
                    const candidateStart = parseClockToMinutes(candidate.time || '00:00');
                    const candidateEnd = candidateStart + Number(candidate.duration || 30);
                    return overlapsRange(nextStart, nextEnd, candidateStart, candidateEnd);
                });
                if (conflict) {
                    triggerToast('That time overlaps an existing appointment or blocked slot.');
                    return;
                }
                setAppointments((prev) => prev.map((a) => a.id === appt.id ? { ...a, time: nextTime } : a));
                if (capacitySettings.autoPromoteWaitlist && previousTime !== nextTime && sortedWaitlistRequests.length) {
                    const candidate = sortedWaitlistRequests[0];
                    setBookingRequests((prev) => ([{
                        id: Date.now(),
                        patientName: candidate.patientName,
                        reqTime: `${appt.date} at ${previousTime}`,
                        reason: `${candidate.reason} · Auto-filled after slot release`,
                        type: 'Waitlist'
                    }, ...prev]));
                    setWaitlistRequests((prev) => prev.filter((row) => String(row.id) !== String(candidate.id)));
                }
                triggerToast(`Appointment moved to ${nextTime}.`);
            };

            const createInvoice = (e) => {
                e.preventDefault();
                const patientId = Number(invoiceForm.patientId);
                const patient = patients.find((p) => p.id === patientId);
                if (!patient) {
                    triggerToast('Select a patient for the invoice.');
                    return;
                }

                const preview = computeInvoicePreview(invoiceForm, patient);
                const amount = preview.amount;
                if (amount <= 0) {
                    triggerToast('The selected act code currently resolves to a zero patient charge. Adjust the billing basis or choose a private / ZCP1 code.');
                    return;
                }
                const nextId = invoices.length ? Math.max(...invoices.map((inv) => Number(inv.id) || 0)) + 1 : 4001;

                setInvoices((prev) => ([
                    {
                        id: nextId,
                        patientId,
                        serviceType: invoiceForm.serviceType,
                        amount,
                        actCode: preview.actMeta.code,
                        actLabel: preview.actMeta.label,
                        coefficient: preview.actMeta.coefficient,
                        quantity: preview.quantity,
                        grossAmount: preview.grossAmount,
                        cnsShare: preview.cnsShare,
                        patientSharePct: preview.patientSharePct,
                        issuedDate: toIsoDate(new Date()),
                        dueDate: invoiceForm.dueDate || toIsoDate(withDays(new Date(), 14)),
                        status: 'sent',
                        notes: invoiceForm.notes || '',
                        paidDate: null
                    },
                    ...prev
                ]));

                setShowInvoiceModal(false);
                setInvoiceForm({ ...DEFAULT_INVOICE_FORM, dueDate: toIsoDate(withDays(new Date(), 14)) });
                triggerToast(`Invoice packet #${nextId} created for ${patient.name}.`);
            };

            const handleAction = (notification) => {
                if (notification.type === 'alert' || notification.type === 'feedback' || notification.type === 'recall') {
                    if (notification.patientId) {
                        const patient = patients.find(p => p.id === notification.patientId);
                        if (patient) {
                            setSelectedPatient(patient);
                            if (notification.type === 'recall') openRecallBooking(patient.id);
                        }
                    }
                } else if (notification.type === 'request') {
                    setActiveTab('schedule');
                }
            };

            // Chat Logic
            const sendMessage = (text) => {
                const trimmed = String(text || '').trim();
                if (!trimmed) return;
                const nowIso = new Date().toISOString();
                const newMsg = { sender: 'me', text: trimmed, timestamp: nowIso, deliveredAt: nowIso, readAt: null };
                setChats(prev => ({
                    ...prev,
                    [activeChat]: [...(prev[activeChat] || []), newMsg]
                }));
                setChatDraft('');

                if (window.VerveSync) {
                    const sharedPatientId = getSharedPatientId({ id: activeChat });
                    const conversationId = getConversationId(sharedPatientId);
                    window.VerveSync.upsertEntity('conversations', {
                        conversationId,
                        patientId: sharedPatientId,
                        clinicianId: clinicianActor.actorId,
                        topic: 'general',
                        status: 'open',
                        createdAt: window.VerveSync.nowIso()
                    }, 'conversationId');

                    window.VerveSync.addMessage({
                        conversationId,
                        patientId: sharedPatientId,
                        senderId: clinicianActor.actorId,
                        senderType: clinicianActor.actorType,
                        body: trimmed
                    });
                }

                markPendingMessagesAsRead(activeChat);
            };

            const getPatientPromAssignments = (patientId) => (
                promAssignments
                    .filter(item => Number(item.patientId) === Number(patientId))
                    .sort((a, b) => String(b.assignedAt || '').localeCompare(String(a.assignedAt || '')))
            );

            const getPromResponsesForAssignment = (assignmentId) => (
                promResponses
                    .filter(item => String(item.assignmentId) === String(assignmentId))
                    .sort((a, b) => String(b.recordedAt || '').localeCompare(String(a.recordedAt || '')))
            );

            const assignPromToSelectedPatient = () => {
                if (!selectedPatient) return;
                const template = PROM_TEMPLATES.find(t => t.id === selectedPromTemplate);
                if (!template) return;

                const assignment = {
                    assignmentId: `prom_asmt_${Date.now()}`,
                    patientId: selectedPatient.id,
                    patientName: selectedPatient.name,
                    templateId: template.id,
                    templateName: template.name,
                    assignedAt: new Date().toISOString(),
                    nextDueAt: withDays(new Date(), template.cadenceDays).toISOString(),
                    status: 'active'
                };

                setPromAssignments(prev => [assignment, ...prev]);
                triggerToast(`${template.name} assigned to ${selectedPatient.name}`);
            };

            const recordPromScore = (assignment) => {
                const template = PROM_TEMPLATES.find(t => t.id === assignment?.templateId);
                const raw = Number(promScoreInput);
                const maxScore = template?.maxScore || 100;
                if (!Number.isFinite(raw) || raw < 0 || raw > maxScore) {
                    triggerToast(`Enter a valid ${template?.name || 'PROM'} score (0-${maxScore}).`);
                    return;
                }

                const response = {
                    responseId: `prom_rsp_${Date.now()}`,
                    assignmentId: assignment.assignmentId,
                    patientId: assignment.patientId,
                    templateId: assignment.templateId,
                    score: raw,
                    maxScore,
                    recordedAt: new Date().toISOString()
                };

                setPromResponses(prev => [response, ...prev]);
                setPromAssignments(prev => prev.map(item => (
                    item.assignmentId === assignment.assignmentId
                        ? { ...item, lastScore: raw, lastRecordedAt: response.recordedAt, nextDueAt: withDays(new Date(), template?.cadenceDays || 14).toISOString() }
                        : item
                )));
                setPromScoreInput('');
                triggerToast(`${assignment.templateName} score saved`);
            };

            const getLatestPromSummary = (patientId) => {
                const patientAssignments = getPatientPromAssignments(patientId);
                if (!patientAssignments.length) return null;
                const latestAssignment = patientAssignments[0];
                const scores = getPromResponsesForAssignment(latestAssignment.assignmentId);
                if (!scores.length) return { assignment: latestAssignment, latest: null, previous: null };
                return { assignment: latestAssignment, latest: scores[0], previous: scores[1] || null };
            };

            const buildDischargeSummary = (patient) => {
                const program = getPatientProgramSummary(patient);
                const prom = getLatestPromSummary(patient.id);
                const episode = patient.cnsEpisode || {};
                const lines = [
                    `Patient: ${patient.name}`,
                    `Primary Dx: ${patient.diagnosis}`,
                    `CNS Ref: ${episode.ordonnanceReference || episode.diagnosisCode || 'N/A'}`,
                    `Sessions completed: ${episode.completedSessions || 0}/${episode.sessionLimit || 0}`,
                    `Current Pain: ${patient.avgPain}/10`,
                    `Adherence (last 7 days): ${patient.adherence}%`,
                    `Active Program: ${program?.title || 'No active assignment'}`,
                    `Program Source: ${program?.source === 'live-assignment' ? 'VerveSync assignment' : 'Program builder fallback'}`
                ];

                if (prom?.latest) {
                    lines.push(`Latest PROM (${prom.assignment.templateName}): ${prom.latest.score}/${prom.latest.maxScore}`);
                } else if (prom?.assignment) {
                    lines.push(`PROM assigned (${prom.assignment.templateName}) but no score logged yet.`);
                }

                lines.push('Discharge Plan: continue independent maintenance plan and book 6-week recall.');
                return lines.join('\n');
            };

            const openDischargeWorkflow = () => {
                if (!selectedPatient) return;
                const followUpDate = withDays(new Date(), 42);
                setDischargeDraft({
                    patientId: selectedPatient.id,
                    patientName: selectedPatient.name,
                    summary: buildDischargeSummary(selectedPatient),
                    followUpDate: toIsoDate(followUpDate)
                });
            };

            const confirmDischarge = () => {
                if (!dischargeDraft) return;
                const patient = getPatientById(dischargeDraft.patientId);
                const finalReport = buildCompteRenduDraft(patient, 'decharger');
                const closureReport = buildCnsClosureReport(patient, dischargeDraft.summary);
                const finalInvoiceNeeded = Number(patient?.cnsEpisode?.patientBalance || 0) > 0;
                const record = {
                    dischargeId: `dis_${Date.now()}`,
                    patientId: dischargeDraft.patientId,
                    patientName: dischargeDraft.patientName,
                    summary: dischargeDraft.summary,
                    dischargedAt: new Date().toISOString(),
                    followUpDate: dischargeDraft.followUpDate,
                    finalReport,
                    closureReport,
                    cnsClosureStatus: patient?.cnsEpisode ? 'ready-to-close' : 'not-applicable'
                };

                setDischargeRecords(prev => [record, ...prev]);

                setPatients(prev => prev.map(p => (
                    p.id === dischargeDraft.patientId
                        ? {
                            ...p,
                            status: 'Discharged',
                            condition_detail: 'Post-discharge monitoring',
                            nextAppt: `Recall ${dischargeDraft.followUpDate}`,
                            nextApptType: '6-week recall',
                            cnsEpisode: p.cnsEpisode
                                ? {
                                    ...p.cnsEpisode,
                                    closureStatus: 'ready-to-close',
                                    closureReportGeneratedAt: record.dischargedAt,
                                    nextAction: 'Rapport de fin de traitement genere. Finaliser la cloture CNS et le solde patient.',
                                    validationLabel: 'Cloture a transmettre'
                                }
                                : p.cnsEpisode
                        }
                        : p
                )));

                if (finalInvoiceNeeded) {
                    setInvoices(prev => ([
                        {
                            id: (prev.length ? Math.max(...prev.map((inv) => Number(inv.id) || 0)) : 4000) + 1,
                            patientId: dischargeDraft.patientId,
                            serviceType: 'Patient balance statement',
                            amount: Number(patient.cnsEpisode.patientBalance || 0),
                            actCode: 'BKIN_1',
                            actLabel: 'Bkin 1 · Standard kinesitherapy session',
                            coefficient: 1,
                            quantity: estimateInvoiceQuantity({ balance: patient.cnsEpisode.patientBalance, actCode: 'BKIN_1', coveragePct: patient.cnsEpisode.coveragePct }),
                            grossAmount: Number(patient.cnsEpisode.patientBalance || 0),
                            cnsShare: 0,
                            patientSharePct: 100,
                            issuedDate: toIsoDate(new Date()),
                            dueDate: toIsoDate(withDays(new Date(), 14)),
                            status: 'sent',
                            notes: 'Final settlement generated at discharge.',
                            paidDate: null
                        },
                        ...prev
                    ]));
                }

                setReportDraft(finalReport);
                setReportMode('discharge');

                if (patient) {
                    ensureRecallTask(patient, {
                        reason: 'Post-discharge recall',
                        dueDate: dischargeDraft.followUpDate,
                        status: 'pending',
                        response: 'scheduled-after-discharge',
                        silent: true
                    });
                }

                setNotifications(prev => ([
                    {
                        id: Date.now() + 7,
                        type: 'recall',
                        title: 'Discharge recall scheduled',
                        desc: `${dischargeDraft.patientName} recall booked for ${dischargeDraft.followUpDate}.`,
                        patientId: dischargeDraft.patientId
                    },
                    ...prev
                ]));

                if (window.VerveSync) {
                    const sharedId = getSharedPatientId({ id: dischargeDraft.patientId });
                    window.VerveSync.upsertEntity('discharges', {
                        dischargeId: record.dischargeId,
                        patientId: sharedId,
                        summary: record.summary,
                        plan: record.plan,
                        followUpDate: record.followUpDate,
                        createdAt: window.VerveSync.nowIso(),
                        updatedAt: window.VerveSync.nowIso()
                    }, 'dischargeId');
                    window.VerveSync.emitEvent('patient.discharged', {
                        patientId: sharedId,
                        actorType: clinicianActor.actorType,
                        actorId: clinicianActor.actorId,
                        entityType: 'Discharge',
                        entityId: record.dischargeId,
                        payload: { record }
                    });
                    window.VerveBus?.emit?.('patient.discharged', {
                        patientId: sharedId,
                        message: `${dischargeDraft.patientName} has been discharged.`,
                        summary: record.summary,
                        transitionPlan: record.plan
                    });
                    window.VerveAudit?.log?.(clinicianActor.actorId, 'patient.discharged', `Discharged ${dischargeDraft.patientName}`, sharedId);
                    VerveAPI.post('/clinical/discharge', {
                        patientId: sharedId,
                        record
                    });
                }

                queueOutboundNotification({
                    channel: 'email',
                    patient: { id: dischargeDraft.patientId, name: dischargeDraft.patientName },
                    subject: 'Discharge summary and follow-up plan',
                    body: `Discharge complete. Follow-up recall: ${dischargeDraft.followUpDate}.`
                });

                triggerToast(`${dischargeDraft.patientName} discharged and recall scheduled.`);
                setDischargeDraft(null);
            };

            const filteredStandardProtocols = STANDARD_PROTOCOLS.filter(p => {
                const matchesFilter = protocolFilter === 'All' || p.tags.includes(protocolFilter) || p.equipment === protocolFilter;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                let matchesView = true;
                if (libraryView === 'recents') matchesView = !!p.lastUsed;
                if (libraryView === 'templates') matchesView = false;
                return matchesFilter && matchesSearch && matchesView;
            });

            const sortedStandardProtocols = [...filteredStandardProtocols].sort((a, b) => {
                const aFav = favorites.includes(a.id);
                const bFav = favorites.includes(b.id);
                if (aFav === bFav) return 0;
                return aFav ? -1 : 1;
            });

            const filteredCustomProtocols = protocols.filter(proto => {
                if (libraryView !== 'templates') return false;
                const matchesSearch = proto.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesSearch;
            });

            const toggleFavorite = (e, id) => {
                e.stopPropagation();
                if (favorites.includes(id)) setFavorites(favorites.filter(fid => fid !== id));
                else setFavorites([...favorites, id]);
            };

            const protocolCatalog = [
                ...STANDARD_PROTOCOLS.map(p => ({ ...p, source: 'standard' })),
                ...protocols.map(p => ({ ...p, source: 'custom' }))
            ];

            const getProtocolById = (id, source) => {
                if (source === 'standard') return STANDARD_PROTOCOLS.find(p => p.id === id);
                if (source === 'custom') return protocols.find(p => p.id === id);
                return protocolCatalog.find(p => p.id === id);
            };

            const getProtocolHistoryForPatient = (patientId) => {
                const patient = patients.find((p) => Number(p.id) === Number(patientId));
                if (!patient) return [];
                const history = new Map();
                const allNames = STANDARD_PROTOCOLS.map((p) => p.name);

                soapRecords
                    .filter((r) => Number(r.patientId) === Number(patientId))
                    .forEach((r) => {
                        const hay = `${r.reason || ''} ${r.soap?.p || ''}`.toLowerCase();
                        allNames.forEach((name) => {
                            if (hay.includes(name.toLowerCase())) history.set(name, r.savedAt || r.date || new Date().toISOString());
                        });
                    });

                dischargeRecords
                    .filter((r) => Number(r.patientId) === Number(patientId))
                    .forEach((r) => {
                        const hay = String(r.summary || '').toLowerCase();
                        allNames.forEach((name) => {
                            if (hay.includes(name.toLowerCase())) history.set(name, r.dischargedAt || new Date().toISOString());
                        });
                    });

                return Array.from(history.entries())
                    .map(([name, lastUsed]) => ({ name, lastUsed }))
                    .sort((a, b) => toMs(b.lastUsed) - toMs(a.lastUsed));
            };

            const addDaysToDate = (date, days) => {
                const next = new Date(date);
                next.setDate(next.getDate() + days);
                return next;
            };

            const toDateOnly = (value) => {
                const d = value instanceof Date ? new Date(value) : new Date(`${value}T00:00:00`);
                d.setHours(0, 0, 0, 0);
                return d;
            };

            const getWeekStartDate = (date) => {
                const d = toDateOnly(date);
                const day = (d.getDay() + 6) % 7;
                d.setDate(d.getDate() - day);
                return d;
            };

            const scheduleBaseDate = scheduleView === 'week' ? getWeekStartDate(scheduleAnchorDate) : toDateOnly(scheduleAnchorDate);
            const scheduleDays = scheduleView === 'week'
                ? Array.from({ length: 7 }, (_, i) => addDaysToDate(scheduleBaseDate, i))
                : [toDateOnly(scheduleAnchorDate)];
            const todayIso = toIsoDate(new Date());
            const formatScheduleDay = (date) => date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const formatWeekRange = () => {
                if (scheduleView !== 'week') return formatScheduleDay(scheduleBaseDate);
                const end = scheduleDays[scheduleDays.length - 1];
                return `${scheduleBaseDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
            };

            const statusFilterOptions = ['all', ...Array.from(new Set(patients.map(p => String(p.status || '')))).filter(Boolean)];
            const filteredPatients = patients.filter((p) => {
                const q = rosterSearchTerm.trim().toLowerCase();
                const matchesSearch = !q
                    || String(p.name || '').toLowerCase().includes(q)
                    || String(p.diagnosis || '').toLowerCase().includes(q)
                    || String(p.id || '').includes(q);
                const matchesStatus = rosterStatusFilter === 'all' || String(p.status || '') === rosterStatusFilter;
                return matchesSearch && matchesStatus;
            });

            const getLatestSoapForPatient = (patientId) => {
                return [...soapRecords]
                    .filter((record) => Number(record.patientId) === Number(patientId))
                    .sort((a, b) => new Date(`${b.date || '1970-01-01'}T00:00:00`) - new Date(`${a.date || '1970-01-01'}T00:00:00`))[0] || null;
            };

            const hasFollowUpBooked = (patient) => {
                const next = String(patient?.nextAppt || '').trim().toLowerCase();
                return Boolean(next) && !['none', 'not scheduled', '-'].includes(next);
            };

            const getPatientRedFlagCount = (patientId) => (getLatestBilanForPatient(patientId)?.data?.redFlags || []).length;

            const hasPendingClinicalNote = (patient) => {
                const latestSoap = getLatestSoapForPatient(patient.id);
                const latestBilan = getLatestBilanForPatient(patient.id);
                const needsAssessmentNote = String(patient?.nextApptType || '').toLowerCase().includes('assessment') && !latestBilan;

                if (needsAssessmentNote) return true;

                if (Number(patient?.lastSeenDays || 999) > 7) return false;
                if (!latestSoap) return true;

                const daysSinceSoap = Math.round((new Date(`${todayIso}T00:00:00`) - new Date(`${latestSoap.date || '1970-01-01'}T00:00:00`)) / 86400000);
                return daysSinceSoap > 7;
            };

            const rosterToneStyles = {
                red: 'bg-red-50/80 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800/70',
                amber: 'bg-amber-50/80 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800/70',
                teal: 'bg-teal-50/80 text-teal-700 border-teal-200 dark:bg-teal-900/30 dark:text-teal-300 dark:border-teal-800/70',
                cyan: 'bg-cyan-50/80 text-cyan-700 border-cyan-200 dark:bg-cyan-900/30 dark:text-cyan-300 dark:border-cyan-800/70',
                blue: 'bg-blue-50/80 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800/70',
                indigo: 'bg-indigo-50/80 text-indigo-700 border-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-300 dark:border-indigo-800/70',
                slate: 'bg-slate-100/80 text-slate-700 border-slate-200 dark:bg-slate-800/60 dark:text-slate-300 dark:border-slate-700/70'
            };

            const getRosterToneClass = (tone = 'slate') => rosterToneStyles[tone] || rosterToneStyles.slate;

            const getRosterFlags = (patient) => {
                const flags = [];
                const redFlags = getPatientRedFlagCount(patient.id);
                const unread = getUnreadCount(patient.id);

                if (redFlags > 0) flags.push({ label: `${redFlags} red flag${redFlags > 1 ? 's' : ''}`, tone: 'red' });
                if (!hasFollowUpBooked(patient)) flags.push({ label: 'No follow-up', tone: 'amber' });
                if (unread > 0) flags.push({ label: `${unread} unread`, tone: 'cyan' });

                return flags;
            };

            const getRosterNextStep = (patient) => {
                const redFlags = getPatientRedFlagCount(patient.id);
                const unread = getUnreadCount(patient.id);

                if (redFlags > 0) return { label: 'Review red flags', detail: 'Open chart and reassess the current risk picture.', tone: 'red' };
                if (!hasFollowUpBooked(patient)) return { label: 'Book follow-up', detail: 'No next appointment is currently locked in.', tone: 'amber' };
                if (hasPendingClinicalNote(patient)) return { label: 'Add clinical note', detail: 'Use Docs for the missing SOAP or assessment note.', tone: 'blue' };
                if (!(patient.activeProtocol || []).length && patient.status !== 'Maintenance') return { label: 'Assign protocol', detail: 'Protocol Library remains the right place for plan building.', tone: 'teal' };
                if (unread > 0) return { label: 'Review patient reply', detail: 'A new message needs acknowledgement or clarification.', tone: 'cyan' };
                if ((patient.sharedWith || []).length > 0) return { label: 'Check trainer handoff', detail: 'Trainer collaboration is active on this case.', tone: 'indigo' };
                return { label: 'On track', detail: `Pain ${patient.avgPain}/10 · ROM ${patient.rom}`, tone: 'slate' };
            };

            const getRosterUrgencyScore = (patient) => {
                let score = 0;
                if (getPatientRedFlagCount(patient.id) > 0) score += 120;
                if (patient.status === 'Restricted' || Number(patient.avgPain || 0) >= 6) score += 90;
                if (!hasFollowUpBooked(patient)) score += 70;
                if (hasPendingClinicalNote(patient)) score += 55;
                if (getUnreadCount(patient.id) > 0) score += 35;
                if (!(patient.activeProtocol || []).length && patient.status !== 'Maintenance') score += 20;
                if (String(patient.nextAppt || '').toLowerCase().includes('today')) score += 12;
                score -= Math.min(Number(patient.adherence || 0), 100) / 10;
                score -= Math.min(Number(patient.lastSeenDays || 0), 30) / 10;
                return score;
            };

            const sortedRosterPatients = [...filteredPatients].sort((a, b) => {
                if (rosterSortMode === 'alphabetical') {
                    return String(a.name || '').localeCompare(String(b.name || ''));
                }

                const scoreDiff = getRosterUrgencyScore(b) - getRosterUrgencyScore(a);
                if (scoreDiff !== 0) return scoreDiff;
                return String(a.name || '').localeCompare(String(b.name || ''));
            });

            const rosterHighAcuityCount = sortedRosterPatients.filter((patient) => patient.status === 'Restricted' || Number(patient.avgPain || 0) >= 6 || getPatientRedFlagCount(patient.id) > 0).length;
            const rosterNoFollowUpCount = sortedRosterPatients.filter((patient) => !hasFollowUpBooked(patient)).length;
            const rosterPendingNoteCount = sortedRosterPatients.filter((patient) => hasPendingClinicalNote(patient)).length;

            const openRosterPatientChart = (patient) => {
                setSelectedPatient(patient);
                setChartTab('overview');
            };

            const openRosterPatientNote = (patient) => {
                const latestBilan = getLatestBilanForPatient(patient.id);
                openPatientWorkspace('docs');
                setDocPatientId(patient.id);

                if (String(patient?.nextApptType || '').toLowerCase().includes('assessment') && !latestBilan) {
                    setClinicalDocType('bilan');
                    setBilanMeta((prev) => ({ ...prev, patientId: patient.id, date: prev.date || todayIso }));
                    return;
                }

                setClinicalDocType('soap');
                setSoapMeta((prev) => ({
                    ...prev,
                    patientId: patient.id,
                    date: prev.date || todayIso,
                    reason: prev.reason || 'Roster follow-up'
                }));
            };

            const openRosterPatientBooking = (patient) => {
                setActiveTab('schedule');
                setBookingPatientSelection(String(patient.id));
                setShowBookingModal(true);
            };

            const getPatientDrawerDocs = (patientId) => {
                const soapDocs = soapRecords
                    .filter((record) => Number(record.patientId) === Number(patientId))
                    .map((record) => ({
                        id: record.noteId,
                        kind: 'soap',
                        title: record.reason || 'SOAP Note',
                        subtitle: record.followUp ? `Follow-up ${record.followUp}` : 'Clinical note',
                        when: record.date || record.savedAt,
                        row: record
                    }));

                const bilanDocs = bilanRecords
                    .filter((record) => Number(record.patientId) === Number(patientId))
                    .map((record) => ({
                        id: record.bilanId,
                        kind: 'bilan',
                        title: 'Bilan Assessment',
                        subtitle: (record.data?.workingDiagnosis || record.patientName || 'Assessment record'),
                        when: record.date || record.savedAt,
                        row: record
                    }));

                const dischargeDocs = dischargeRecords
                    .filter((record) => Number(record.patientId) === Number(patientId))
                    .map((record) => ({
                        id: record.dischargeId,
                        kind: 'discharge',
                        title: 'Discharge Summary',
                        subtitle: record.followUpDate ? `Recall ${record.followUpDate}` : 'Discharge completed',
                        when: record.dischargedAt,
                        row: record
                    }));

                return [...soapDocs, ...bilanDocs, ...dischargeDocs]
                    .sort((a, b) => new Date(b.when || 0) - new Date(a.when || 0));
            };

            const openDrawerDocWorkspace = (patient, kind, row = null) => {
                if (!patient) return;

                if (kind === 'discharge') {
                    setChartTab('docs');
                    if (row) {
                        setDischargeDraft({
                            patientId: row.patientId,
                            patientName: row.patientName,
                            summary: row.summary,
                            followUpDate: row.followUpDate
                        });
                    } else {
                        setSelectedPatient(patient);
                        requestAnimationFrame(() => {
                            document.getElementById('chart-docs')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        });
                        openDischargeWorkflow();
                    }
                    return;
                }

                openPatientWorkspace('docs');
                setDocPatientId(patient.id);
                setSelectedPatient(null);

                if (kind === 'soap') {
                    if (row) {
                        loadSoapNote(row);
                    } else {
                        setClinicalDocType('soap');
                        setSoapMeta((prev) => ({
                            ...prev,
                            patientId: patient.id,
                            date: prev.date || todayIso,
                            reason: prev.reason || 'Patient drawer quick note'
                        }));
                    }
                    return;
                }

                if (kind === 'bilan') {
                    if (row) {
                        loadBilanRecord(row);
                    } else {
                        setClinicalDocType('bilan');
                        setBilanMeta((prev) => ({ ...prev, patientId: patient.id, date: prev.date || todayIso }));
                    }
                }
            };

            const parseConstraintText = (raw) => {
                const chunks = String(raw || '').split(/\n|,/).map(t => t.trim()).filter(Boolean);
                return chunks.map((val) => {
                    const lower = val.toLowerCase();
                    let type = 'Precaution';
                    if (lower.includes('rom') || lower.includes('flex') || lower.includes('extension')) type = 'ROM';
                    else if (lower.includes('load') || lower.includes('kg') || lower.includes('%')) type = 'Load';
                    else if (lower.includes('no ') || lower.includes('avoid') || lower.includes('block')) type = 'Blocked';
                    return { type, val };
                });
            };

            const openNewPatientFlow = (seedBooking = null) => {
                setNewPatientSeedBooking(seedBooking || null);
                setShowNewPatientModal(true);
            };

            const createNewPatient = (e) => {
                e.preventDefault();
                const name = String(newPatientForm.name || '').trim();
                const diagnosis = String(newPatientForm.diagnosis || '').trim();
                if (!name || !diagnosis) {
                    triggerToast('Name and diagnosis are required.');
                    return;
                }
                if (newPatientForm.intakeMode === 'ordonnance') {
                    const ordonnanceRequired = [
                        newPatientForm.prescribingPhysician,
                        newPatientForm.diagnosisCode,
                        newPatientForm.ordonnanceDate,
                        newPatientForm.sessionsAuthorized,
                        newPatientForm.matricule,
                        newPatientForm.cnsMemberNumber,
                        newPatientForm.dob,
                        newPatientForm.fullAddress
                    ].every(Boolean);
                    if (!ordonnanceRequired) {
                        triggerToast('Ordonnance intake requires physician, diagnosis code, sessions, patient IDs, DOB, and full address.');
                        return;
                    }
                }

                const nextId = (patients.reduce((max, p) => Math.max(max, Number(p.id) || 0), 0) || 0) + 1;
                const constraints = parseConstraintText(newPatientForm.initialConstraints);

                let activeProtocol = [];
                if (newPatientForm.protocolSelection) {
                    const [source, protocolId] = String(newPatientForm.protocolSelection).split(':');
                    const proto = getProtocolById(protocolId, source);
                    activeProtocol = (proto?.exercises || []).map(ex => ({
                        name: ex.name,
                        sets: ex.sets || '3',
                        reps: ex.reps || '10',
                        freq: ex.freq || '1x/day',
                        completed: 0
                    }));
                }

                const intakePathway = inferLuxPathway(newPatientForm.sessionsAuthorized);
                const coveragePct = inferCoveragePct(intakePathway);
                const sessionLimit = Math.max(1, Number(newPatientForm.sessionsAuthorized || 8));
                const seededEpisode = newPatientForm.intakeMode === 'ordonnance'
                    ? {
                        pathway: intakePathway,
                        diagnosisCode: newPatientForm.diagnosisCode,
                        coveragePct,
                        sessionLimit,
                        blockSize: 8,
                        completedSessions: 0,
                        validationStatus: 'pending',
                        validationLabel: 'Ordonnance captured',
                        pidStatus: 'pending',
                        pidLabel: 'Awaiting first CNS claim',
                        prescriber: newPatientForm.prescribingPhysician,
                        prescriberProviderId: newPatientForm.physicianProviderId,
                        ordonnanceDate: newPatientForm.ordonnanceDate,
                        ordonnanceReference: newPatientForm.ordonnanceReference || `ORD-${nextId}-${newPatientForm.ordonnanceDate}`,
                        matricule: newPatientForm.matricule,
                        cnsMemberNumber: newPatientForm.cnsMemberNumber,
                        cnsAmount: 0,
                        patientBalance: 0,
                        complementaryStatus: coveragePct < 100 ? 'waiting' : 'not-needed',
                        nextAction: 'Initial ordonnance captured. Complete BDK and monitor the first CNS-covered block.',
                        priority: 2,
                        adminLanguage: newPatientForm.adminLanguage,
                        appendixCode: intakePathway === 'serious-pathology' ? 'G' : null
                    }
                    : null;

                const newPatient = {
                    id: nextId,
                    name,
                    age: Number(newPatientForm.age) || 30,
                    diagnosis,
                    status: newPatientForm.status || (constraints.length ? 'Restricted' : 'Modified'),
                    condition_detail: newPatientForm.conditionDetail || 'Initial Assessment',
                    adherence: 0,
                    painTrend: [],
                    avgPain: 0,
                    rom: '-',
                    nextAppt: newPatientSeedBooking ? `${newPatientSeedBooking.date} ${newPatientSeedBooking.time}` : 'Not scheduled',
                    nextApptType: newPatientSeedBooking?.type || 'Initial Assessment',
                    constraints,
                    goals: [],
                    activeProtocol,
                    readiness: { hrv: 0, sleep: '-', score: '-' },
                    hotspots: {},
                    stream: [],
                    history: [],
                    medicalHistory: [],
                    lastSeenDays: 0,
                    sharedWith: [],
                    trainerActivity: [],
                    demographics: {
                        gender: newPatientForm.gender,
                        phone: newPatientForm.phone,
                        dob: newPatientForm.dob,
                        fullAddress: newPatientForm.fullAddress,
                        city: newPatientForm.city,
                        postalCode: newPatientForm.postalCode,
                        country: newPatientForm.country
                    },
                    cnsEpisode: seededEpisode,
                    intakeSource: newPatientForm.intakeMode,
                    physician: {
                        name: newPatientForm.prescribingPhysician,
                        providerId: newPatientForm.physicianProviderId
                    }
                };

                setPatients(prev => [...prev, newPatient]);

                if (newPatientSeedBooking) {
                    const seededAppt = {
                        id: Date.now(),
                        patientId: nextId,
                        time: newPatientSeedBooking.time,
                        date: newPatientSeedBooking.date,
                        type: newPatientSeedBooking.type || 'Initial Assessment',
                        duration: Number(newPatientSeedBooking.duration || 45),
                        status: 'confirmed'
                    };
                    setAppointments(prev => [...prev, seededAppt]);
                }

                setSelectedPatient(newPatient);
                setShowNewPatientModal(false);
                setNewPatientSeedBooking(null);
                VerveAPI.post('/clinical/patients', {
                    patientId: getSharedPatientId(newPatient),
                    name: newPatient.name,
                    diagnosis: newPatient.diagnosis,
                    status: newPatient.status,
                    consentStatus: 'pending',
                    intakeMode: newPatientForm.intakeMode,
                    ordonnanceReference: seededEpisode?.ordonnanceReference || null,
                    matricule: newPatientForm.matricule || null
                });
                queueOutboundNotification({
                    channel: 'email',
                    patient: newPatient,
                    subject: 'Complete intake and consent',
                    body: 'Please complete your intake forms and consent workflow before your first session.'
                });
                setNewPatientForm({ ...DEFAULT_NEW_PATIENT_FORM });
                triggerToast(`New patient created: ${name}`);
            };

            // --- RENDER HELPERS ---

            const renderPatientList = () => (
                <div className="glass-panel rounded-2xl shadow-xl overflow-hidden">
                    <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-white/20 dark:bg-slate-800/20 border-b border-white/20 dark:border-white/10 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider backdrop-blur-sm">
                                <th className="px-6 py-4">Patient</th>
                                <th className="px-6 py-4">Condition</th>
                                <th className="px-6 py-4">Next Step</th>
                                <th className="px-6 py-4">Status</th>
                                <th className="px-6 py-4">Next Appt</th>
                                <th className="px-6 py-4 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-white/20 dark:divide-white/10">
                            {sortedRosterPatients.map((patient) => {
                                const nextStep = getRosterNextStep(patient);
                                const flags = getRosterFlags(patient);
                                return (
                                <tr key={patient.id} onClick={() => openRosterPatientChart(patient)} className={`hover:bg-white/20 dark:hover:bg-slate-700/30 cursor-pointer transition-colors group ${getPatientRedFlagCount(patient.id) > 0 ? 'bg-red-50/20 dark:bg-red-900/10' : ''}`}>
                                    <td className="px-6 py-4 align-top">
                                        <div className="flex items-start justify-between gap-3">
                                            <div>
                                                <p className="font-semibold text-slate-800 dark:text-slate-200 tracking-[-0.01em]">{patient.name}</p>
                                                <p className="text-slate-500 text-[11px] font-mono opacity-80 mt-0.5">ID: #{8820 + patient.id} · {patient.age}y</p>
                                            </div>
                                            {getRosterUrgencyScore(patient) >= 90 && (
                                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold border bg-red-50/80 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800/70">
                                                    Priority
                                                </span>
                                            )}
                                        </div>
                                        {flags.length > 0 && (
                                            <div className="flex items-center gap-1 mt-2 flex-wrap">
                                                {flags.map((flag) => (
                                                    <span key={flag.label} className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full border text-[10px] font-bold ${getRosterToneClass(flag.tone)}`}>
                                                        {flag.label}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        {patient.sharedWith && patient.sharedWith.length > 0 && (
                                            <div className="flex items-center gap-1 mt-1.5 flex-wrap">
                                                {patient.sharedWith.map(t => (
                                                    <span key={t.trainerId} className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 rounded-full text-[9px] font-bold text-indigo-600 dark:text-indigo-400">
                                                        <Dumbbell size={8}/> {t.trainerName}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </td>
                                    <td className="px-6 py-4 align-top">
                                        <div className="text-sm font-semibold text-slate-700 dark:text-slate-300">{patient.diagnosis}</div>
                                        <div className="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-5">{patient.condition_detail}</div>
                                        <div className="mt-2 text-[11px] text-slate-500 dark:text-slate-400">Pain {patient.avgPain}/10 · ROM {patient.rom}</div>
                                    </td>
                                    <td className="px-6 py-4 align-top">
                                        <div className="rounded-xl border border-slate-200/60 dark:border-slate-700/60 bg-white/30 dark:bg-slate-900/25 px-3 py-3 max-w-[250px]">
                                            <div className={`inline-flex items-center px-2.5 py-1 rounded-full border text-[11px] font-bold ${getRosterToneClass(nextStep.tone)}`}>
                                                {nextStep.label}
                                            </div>
                                            <div className="text-xs text-slate-500 dark:text-slate-400 mt-2 leading-5">{nextStep.detail}</div>
                                        </div>
                                    </td>
                                    <td className="px-6 py-4 align-top">
                                        <StatusBadge status={patient.status} onClick={(e) => cycleStatus(e, patient.id)} />
                                        <div className="mt-2 text-[11px] text-slate-500 dark:text-slate-400">Adherence {patient.adherence}%</div>
                                    </td>
                                    <td className="px-6 py-4 align-top">
                                        <div className="text-sm font-bold text-teal-700 dark:text-teal-400">{patient.nextAppt}</div>
                                        <div className="text-[11px] text-slate-500 dark:text-slate-400 mt-1 leading-5">{patient.nextApptType || 'No appointment type set'}</div>
                                    </td>
                                    <td className="px-6 py-4 text-end align-top">
                                        <div className="flex items-center justify-end gap-2 flex-wrap">
                                            <button
                                                onClick={(e) => { e.stopPropagation(); setReferToTrainerModal({ patientId: patient.id }); }}
                                                className="p-2 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors"
                                                title="Refer to Trainer"
                                            >
                                                <Users size={16} />
                                            </button>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); setAssignProtocolModal({ patientId: patient.id }); }}
                                                className="p-2 hover:bg-white/30 dark:hover:bg-slate-700/50 rounded-full text-slate-400 hover:text-teal-600 dark:hover:text-teal-400 transition-colors"
                                                title="Assign Protocol"
                                            >
                                                <FileText size={16} />
                                            </button>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); openRosterPatientNote(patient); }}
                                                className="p-2 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                                title="Add clinical note"
                                            >
                                                <FileTextMedical size={16} />
                                            </button>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); openRosterPatientBooking(patient); }}
                                                className="p-2 hover:bg-amber-50 dark:hover:bg-amber-900/30 rounded-full text-slate-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors"
                                                title="Book follow-up"
                                            >
                                                <CalendarCheck size={16} />
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            )})}
                            {sortedRosterPatients.length === 0 && (
                                <tr>
                                    <td colSpan="6" className="px-6 py-10 text-center text-sm text-slate-400 italic">No patients match the current filters.</td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            );

            const renderPatientGrid = () => (
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                    {['Restricted', 'Modified', 'Cleared', 'Maintenance'].map(status => (
                        <div
                            key={status}
                            className="space-y-3"
                            onDragOver={(e) => e.preventDefault()}
                            onDrop={() => {
                                if (dragPatientId) movePatientToStatus(dragPatientId, status);
                                setDragPatientId(null);
                            }}
                        >
                            <div className="flex items-center gap-2 mb-2">
                                <div className={`w-2 h-2 rounded-full ${status === 'Restricted' ? 'bg-red-500' : status === 'Modified' ? 'bg-amber-500' : status === 'Cleared' ? 'bg-emerald-500' : 'bg-slate-400'}`}></div>
                                <span className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{status}</span>
                            </div>
                            {sortedRosterPatients.filter(p => (status === 'Restricted' ? ['Restricted', 'High Acuity'].includes(p.status) : p.status === status)).map(p => {
                                const nextStep = getRosterNextStep(p);
                                const flags = getRosterFlags(p);
                                return (
                                <div
                                    key={p.id}
                                    draggable
                                    onDragStart={() => setDragPatientId(p.id)}
                                    onDragEnd={() => setDragPatientId(null)}
                                    onClick={() => openRosterPatientChart(p)}
                                    className="glass-panel rounded-xl p-4 shadow-sm hover:shadow-md cursor-pointer transition-all hover:-translate-y-1"
                                >
                                    <div className="flex justify-between items-start mb-2">
                                        <div className="font-bold text-slate-800 dark:text-slate-200 text-sm">{p.name}</div>
                                        <span className="text-[10px] font-mono text-slate-400">#{8820 + p.id}</span>
                                    </div>
                                    <div className="text-xs text-slate-600 dark:text-slate-400 mb-2">{p.diagnosis}</div>
                                    {flags.length > 0 && (
                                        <div className="flex items-center gap-1 mb-2 flex-wrap">
                                            {flags.map((flag) => (
                                                <span key={flag.label} className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full border text-[9px] font-bold ${getRosterToneClass(flag.tone)}`}>
                                                    {flag.label}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                    {p.sharedWith && p.sharedWith.length > 0 && (
                                        <div className="flex items-center gap-1 mb-2 flex-wrap">
                                            {p.sharedWith.map(t => (
                                                <span key={t.trainerId} className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 rounded-full text-[9px] font-bold text-indigo-600 dark:text-indigo-400">
                                                    <Dumbbell size={8}/> {t.trainerName}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                    <div className={`inline-flex items-center px-2 py-1 rounded-full border text-[10px] font-bold ${getRosterToneClass(nextStep.tone)}`}>{nextStep.label}</div>
                                    <div className="text-[11px] text-slate-500 dark:text-slate-400 mt-2 leading-5 min-h-[34px]">{nextStep.detail}</div>
                                    <div className="flex justify-between items-center pt-2 border-t border-slate-200/50 dark:border-slate-700/50">
