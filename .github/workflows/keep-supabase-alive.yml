name: Keep Supabase Alive

on:
  schedule:
    # Run at 09:00 UTC every Monday and Thursday (twice a week).
    # Supabase pauses after 7 days of inactivity — this gives a safe 3-4 day buffer.
    # Using specific days (Mon=1, Thu=4) avoids the monthly-reset gap of "*/3" cron syntax.
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  # ── 1. Keep Supabase alive via a real database query ──────────────────────
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (database query)
        env:
          # Fallback to hardcoded values if GitHub secrets are not configured.
          # The anon key is safe to expose — it is already bundled inside the mobile app.
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          URL="${SUPABASE_URL:-https://aajygxgdbkinbgdjxxpu.supabase.co}"
          KEY="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhanlneGdkYmtpbmJnZGp4eHB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzU0ODMsImV4cCI6MjA5Njk1MTQ4M30.T0IqoJcYhg-75IfkVvcWHB0AOOenpEr9w65NSEHGd_A}"

          echo "=== Pinging Supabase to prevent suspension ==="
          echo "URL: $URL"

          # Hit the REST API — this performs a real SELECT on the exercises table,
          # which Supabase counts as database activity and resets the inactivity timer.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$URL/rest/v1/exercises?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")

          echo "REST API status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Supabase is alive. Inactivity timer reset."
          else
            echo "❌ Unexpected status $HTTP_STATUS — check credentials or project status."
            exit 1
          fi

  # ── 2. Keep this GitHub Actions workflow itself alive ──────────────────────
  # GitHub disables scheduled workflows on repos with no activity for 60 days.
  # This job automatically commits a tiny timestamp file to keep the repo "active".
  keepalive-workflow:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keep GitHub Actions workflow enabled
        uses: gautamkrishnar/keepalive-workflow@v2
